<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Escape Room de Romano</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0c0c14;font-family:'Outfit',sans-serif;color:#fff;height:100vh;overflow:hidden;touch-action:manipulation;-webkit-user-select:none;user-select:none}
    #menu{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:radial-gradient(ellipse,rgba(12,12,20,.97),rgba(6,6,10,.99))}
    #menu.h{display:none}
    .mb{text-align:center;padding:28px 34px;border-radius:22px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);max-width:90vw}
    .mb h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(20px,5vw,32px);font-weight:800;margin-bottom:3px;background:linear-gradient(135deg,#C084FC,#F472B6,#FB923C);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .mb .sub{color:rgba(255,255,255,.2);font-size:9px;letter-spacing:3px;text-transform:uppercase;margin-bottom:20px}
    #ni{display:block;width:200px;max-width:80vw;margin:0 auto 12px;padding:11px 16px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;border:1.5px solid rgba(255,255,255,.06);border-radius:12px;background:rgba(255,255,255,.03);color:#fff;text-align:center;outline:none}
    .btn{display:block;width:200px;max-width:80vw;margin:6px auto 0;padding:11px;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;border:none;border-radius:12px;cursor:pointer;letter-spacing:.3px}
    .btn1{background:linear-gradient(135deg,#C084FC,#F472B6);color:#0c0c14}
    .btn2{background:rgba(255,255,255,.06);color:rgba(255,255,255,.5)}
    .ht{margin-top:12px;color:rgba(255,255,255,.12);font-size:8px;line-height:2}
    #lp{display:flex;gap:6px;justify-content:center;margin:10px 0;flex-wrap:wrap}
    .lpp{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;color:#0c0c14}
    #li{color:rgba(255,255,255,.25);font-size:11px;margin-bottom:6px}

    /* Game */
    #gm{display:none;height:100vh;flex-direction:column}
    #gm.s{display:flex}
    #tb{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(0,0,0,.3);border-bottom:1px solid rgba(255,255,255,.03);flex-shrink:0}
    #rl{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700}
    #tl{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:800}
    #hl{font-size:10px;color:rgba(255,255,255,.3);cursor:pointer;-webkit-tap-highlight-color:transparent}
    #bb{background:none;border:none;color:rgba(255,255,255,.25);font-size:14px;cursor:pointer;padding:4px}

    /* Content: puzzle + chat side by side on desktop, stacked on mobile */
    #ct{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
    @media(min-width:700px){#ct{flex-direction:row}}

    /* Puzzle */
    #pa{flex:1;display:flex;flex-direction:column;align-items:center;padding:14px;overflow-y:auto;min-height:0}
    #pt{font-family:'Space Grotesk',sans-serif;font-size:clamp(16px,4vw,22px);font-weight:800;margin-bottom:4px;color:#C084FC}
    #pd{font-size:12px;color:rgba(255,255,255,.35);margin-bottom:12px;text-align:center;max-width:380px;line-height:1.5}
    /* Visual puzzle area */
    #pv{width:100%;max-width:380px;min-height:120px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center}
    .pv-item{width:60px;height:60px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;border:2px solid rgba(255,255,255,.08);transition:all .2s;-webkit-tap-highlight-color:transparent;flex-direction:column}
    .pv-item:hover{border-color:rgba(192,132,252,.3);transform:scale(1.05)}
    .pv-item.sel{border-color:#C084FC;background:rgba(192,132,252,.15)}
    .pv-item .pv-label{font-size:8px;margin-top:2px;color:rgba(255,255,255,.3)}
    /* Clue box */
    #mc{background:rgba(192,132,252,.06);border:1px solid rgba(192,132,252,.12);border-radius:12px;padding:12px 16px;margin-bottom:10px;max-width:380px;width:100%;text-align:center}
    #mc .cl{font-size:8px;text-transform:uppercase;letter-spacing:2px;color:rgba(192,132,252,.4);margin-bottom:4px}
    #mc .ct2{font-size:13px;font-weight:600;color:#E9D5FF;line-height:1.5;white-space:pre-line}
    /* Answer */
    #ab{display:flex;gap:6px;max-width:380px;width:100%}
    #ai{flex:1;padding:10px 14px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;border:1.5px solid rgba(255,255,255,.06);border-radius:10px;background:rgba(255,255,255,.03);color:#fff;outline:none}
    #ai:focus{border-color:rgba(192,132,252,.25)}
    #as{padding:10px 16px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;border:none;border-radius:10px;background:linear-gradient(135deg,#C084FC,#F472B6);color:#0c0c14;cursor:pointer}
    #fb{margin-top:8px;font-size:12px;font-weight:600;min-height:18px}

    /* Chat */
    #ca{flex-shrink:0;height:140px;border-top:1px solid rgba(255,255,255,.03);background:rgba(0,0,0,.2);display:flex;flex-direction:column}
    @media(min-width:700px){#ca{width:260px;height:auto;border-top:none;border-left:1px solid rgba(255,255,255,.03)}}
    #cm{flex:1;overflow-y:auto;padding:6px 10px;display:flex;flex-direction:column;gap:2px}
    .msg{font-size:11px;line-height:1.3}.msg .n{font-weight:700;margin-right:3px}
    .sys{font-size:10px;color:rgba(192,132,252,.4);font-style:italic}
    #cf{display:flex;gap:4px;padding:6px 10px;border-top:1px solid rgba(255,255,255,.02)}
    #ci{flex:1;padding:8px 12px;font-family:'Outfit',sans-serif;font-size:12px;border:1px solid rgba(255,255,255,.04);border-radius:8px;background:rgba(255,255,255,.02);color:#fff;outline:none}
    #cs{padding:8px 12px;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;border:none;border-radius:8px;background:rgba(192,132,252,.15);color:#C084FC;cursor:pointer}

    /* Overlay */
    #ol{display:none;position:fixed;inset:0;z-index:90;background:rgba(6,6,10,.93);backdrop-filter:blur(6px);align-items:center;justify-content:center;text-align:center;flex-direction:column;padding:20px}
    #ol.s{display:flex}
    #ol h2{font-family:'Space Grotesk',sans-serif;font-size:clamp(20px,5vw,28px);font-weight:800;margin-bottom:6px}
    #ol p{color:rgba(255,255,255,.35);font-size:13px;line-height:1.6}
  </style>
</head>
<body>
<div id="menu"><div class="mb">
  <h1>Escape Room de Romano</h1>
  <div class="sub">cooperativo &middot; 2-4 jugadores</div>
  <input type="text" id="ni" placeholder="Tu nombre..." maxlength="12" autofocus value="Romano">
  <button class="btn btn1" id="jb">UNIRSE</button>
  <div id="li"></div>
  <div id="lp"></div>
  <button class="btn btn2" id="sb" style="display:none">EMPEZAR</button>
  <div class="ht">Cada uno ve pistas diferentes &middot; Usen el chat<br>3 salas &middot; 5 minutos cada una</div>
</div></div>

<div id="gm">
  <div id="tb">
    <button id="bb" onclick="location.href='/'">&#8592;</button>
    <div id="rl">Sala 1</div>
    <div id="tl" style="color:#C084FC">5:00</div>
    <div id="hl" onclick="socket.emit('hint')">💡 3</div>
  </div>
  <div id="ct">
    <div id="pa">
      <div id="pt">Cargando...</div>
      <div id="pd"></div>
      <div id="pv"></div>
      <div id="mc"><div class="cl">Tu pista</div><div class="ct2" id="clue">Esperando...</div></div>
      <div id="ab">
        <input type="text" id="ai" placeholder="Respuesta..." maxlength="30" autocomplete="off">
        <button id="as">ENVIAR</button>
      </div>
      <div id="fb"></div>
    </div>
    <div id="ca">
      <div id="cm"></div>
      <form id="cf" onsubmit="sendChat(event)">
        <input type="text" id="ci" placeholder="Escribe..." maxlength="100" autocomplete="off">
        <button type="submit" id="cs">Enviar</button>
      </form>
    </div>
  </div>
</div>

<div id="ol"><h2 id="ot"></h2><p id="om"></p></div>

<script src="/socket.io/socket.io.js"></script>
<script>
(function(){
var socket=window.socket=io('/escape',{transports:['websocket']});
var joined=false;
var ROOMS=['Laboratorio','Mansion Embrujada','Piramide Antigua'];
var RCOL=['#C084FC','#F472B6','#FB923C'];
var curRoom=0;

// Puzzle visuals for each type
var PUZZLE_VISUALS={
  Codigo:function(d){return makeGrid(['1','2','3','4','5','6','7','8','9','*','0','#'],'#C084FC');},
  Colores:function(d){return makeColorWires();},
  Secuencia:function(d){return makeSymbols();},
  Combinacion:function(d){return makeSafe();},
  Fantasmas:function(d){return makeCandles();},
  Llave:function(d){return makeKeys();},
  Jeroglificos:function(d){return makeHiero();},
  Trampa:function(d){return makeTrapGrid();},
  Tesoro:function(d){return makeChest();}
};

function makeGrid(items,color){
  var html='';
  for(var i=0;i<items.length;i++){
    html+='<div class="pv-item" style="background:rgba(192,132,252,.06);width:50px;height:50px;font-size:18px" onclick="typeChar(\''+items[i]+'\')">'+items[i]+'</div>';
  }
  return html;
}
function makeColorWires(){
  var colors=[{c:'#EF4444',n:'Rojo'},{c:'#3B82F6',n:'Azul'},{c:'#22C55E',n:'Verde'},{c:'#F59E0B',n:'Amarillo'}];
  var html='';
  for(var i=0;i<4;i++){
    html+='<div class="pv-item" style="background:'+colors[i].c+'22;border-color:'+colors[i].c+'44;width:70px;height:70px" onclick="typeChar(\''+colors[i].n+'\')"><div style="width:30px;height:6px;background:'+colors[i].c+';border-radius:3px"></div><div class="pv-label">'+colors[i].n+'</div></div>';
  }
  return html;
}
function makeSymbols(){
  var syms=['★','◆','●','▲','■','♦'];
  var html='';
  for(var i=0;i<syms.length;i++){
    html+='<div class="pv-item" style="background:rgba(192,132,252,.06);font-size:22px" onclick="typeChar(\''+syms[i]+'\')">'+syms[i]+'</div>';
  }
  return html;
}
function makeSafe(){
  return '<div style="width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.03);border:3px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;flex-direction:column"><div style="font-size:11px;color:rgba(255,255,255,.2);margin-bottom:8px">CAJA FUERTE</div><div style="font-size:28px;font-family:Space Grotesk;font-weight:800;color:rgba(255,255,255,.5);letter-spacing:8px" id="safeDisplay">_ _ _</div></div>';
}
function makeCandles(){
  var html='';
  for(var i=1;i<=5;i++){
    html+='<div class="pv-item" style="background:rgba(251,191,36,.06);border-color:rgba(251,191,36,.15);width:50px;height:70px;font-size:26px" onclick="typeChar(\''+i+'\')">🕯️<div class="pv-label">'+i+'</div></div>';
  }
  return html;
}
function makeKeys(){
  var html='';
  var cols=['🔑','🗝️','🔑','🗝️'];
  for(var i=0;i<4;i++){
    html+='<div class="pv-item" style="background:rgba(251,191,36,.06);font-size:22px" onclick="typeChar(\''+(i+1)+'\')">'+cols[i%2]+'<div class="pv-label">Llave '+(i+1)+'</div></div>';
  }
  return html;
}
function makeHiero(){
  var syms=['𓂀','𓃭','𓆣','𓇳'];
  var html='';
  for(var i=0;i<syms.length;i++){
    html+='<div class="pv-item" style="background:rgba(251,146,60,.06);border-color:rgba(251,146,60,.15);font-size:28px" onclick="typeChar(\''+syms[i]+'\')">'+syms[i]+'</div>';
  }
  return html;
}
function makeTrapGrid(){
  var html='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px">';
  for(var r=0;r<4;r++){
    for(var c=0;c<4;c++){
      var id=String.fromCharCode(65+r)+(c+1);
      html+='<div class="pv-item" style="background:rgba(251,146,60,.04);width:48px;height:48px;font-size:10px;font-weight:700" onclick="typeChar(\''+id+'\')">'+id+'</div>';
    }
  }
  html+='</div>';
  return html;
}
function makeChest(){
  return '<div style="text-align:center"><div style="font-size:64px;margin-bottom:8px">🏆</div><div style="font-size:11px;color:rgba(255,255,255,.25)">Ingresa el codigo final</div></div>';
}

window.typeChar=function(ch){
  var inp=document.getElementById('ai');
  inp.value+=ch;
  inp.focus();
};

// Join
document.getElementById('jb').onclick=function(){
  socket.emit('join',{name:document.getElementById('ni').value.trim()||'Jugador'});
  joined=true;this.style.display='none';
  document.getElementById('li').textContent='Conectado!';
  document.getElementById('sb').style.display='block';
};
document.getElementById('ni').onkeydown=function(e){if(e.key==='Enter')document.getElementById('jb').click();};
document.getElementById('sb').onclick=function(){socket.emit('start');};
document.getElementById('ai').onkeydown=function(e){if(e.key==='Enter'){e.preventDefault();submitAns();}};
document.getElementById('as').onclick=function(){submitAns();};

function submitAns(){
  var inp=document.getElementById('ai'),v=inp.value.trim();
  if(!v)return;
  socket.emit('answer',{answer:v});
  inp.value='';
}
window.sendChat=function(e){
  e.preventDefault();
  var inp=document.getElementById('ci'),m=inp.value.trim();
  if(!m)return;
  socket.emit('chat',{msg:m});
  inp.value='';
};

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function addMsg(name,color,msg){
  var el=document.createElement('div');el.className='msg';
  el.innerHTML='<span class="n" style="color:'+color+'">'+esc(name)+':</span>'+esc(msg);
  document.getElementById('cm').appendChild(el);
  document.getElementById('cm').scrollTop=999999;
}
function addSys(t){
  var el=document.createElement('div');el.className='sys';el.textContent=t;
  document.getElementById('cm').appendChild(el);
  document.getElementById('cm').scrollTop=999999;
}

// ── Socket events ──
socket.on('state',function(d){
  if(d.phase==='lobby'){
    var lp=document.getElementById('lp');lp.innerHTML='';
    for(var i=0;i<d.players.length;i++){
      var p=d.players[i];
      var el=document.createElement('div');el.className='lpp';
      el.style.background=p.color;el.textContent=p.name;
      lp.appendChild(el);
    }
    document.getElementById('li').textContent='Jugadores: '+d.players.length+'/4';
  } else if(d.phase==='playing'){
    if(!document.getElementById('gm').classList.contains('s')){
      document.getElementById('menu').classList.add('h');
      document.getElementById('gm').classList.add('s');
    }
    curRoom=d.currentRoom||0;
    var m=Math.floor(d.timer/60),s=d.timer%60;
    var tl=document.getElementById('tl');
    tl.textContent=m+':'+(s<10?'0':'')+s;
    tl.style.color=d.timer<30?'#F87171':(d.timer<60?'#FBBF24':RCOL[curRoom]);
    document.getElementById('hl').textContent='💡 '+(d.hintsLeft||0);
    document.getElementById('rl').textContent='Sala '+(curRoom+1)+': '+ROOMS[curRoom];
    document.getElementById('rl').style.color=RCOL[curRoom];
  }
});

socket.on('puzzle',function(d){
  var ri=typeof d.room==='number'?d.room:ROOMS.indexOf(d.room);
  if(ri<0)ri=0;curRoom=ri;
  var pn=d.puzzleName||d.title||'Puzzle';
  document.getElementById('pt').textContent=pn;
  document.getElementById('pt').style.color=RCOL[ri];
  document.getElementById('pd').textContent=d.description||'';
  // Clues
  var clue=d.clue||'';
  if(d.clues){clue=Array.isArray(d.clues)?d.clues.join('\n'):String(d.clues);}
  document.getElementById('clue').textContent=clue;
  // Visual puzzle
  var pv=document.getElementById('pv');
  var vizFn=PUZZLE_VISUALS[pn];
  pv.innerHTML=vizFn?vizFn(d):'';
  // Reset
  document.getElementById('fb').textContent='';
  document.getElementById('ai').value='';
});

socket.on('chat',function(d){addMsg(d.name,d.color,d.msg);});
socket.on('wrong',function(d){
  document.getElementById('fb').textContent=d.msg||'Incorrecto!';
  document.getElementById('fb').style.color='#F87171';
});
socket.on('solved',function(d){
  document.getElementById('fb').textContent='Puzzle resuelto!';
  document.getElementById('fb').style.color='#4ADE80';
  addSys('Puzzle resuelto!');
});
socket.on('roomComplete',function(d){
  addSys('Sala completada!');
  var ol=document.getElementById('ol'),t=document.getElementById('ot'),m=document.getElementById('om');
  ol.classList.add('s');t.textContent='SALA COMPLETADA';t.style.color='#4ADE80';
  m.textContent='Siguiente: '+ROOMS[d.nextRoom||0];
  setTimeout(function(){ol.classList.remove('s');},2500);
});
socket.on('gameOver',function(d){
  var ol=document.getElementById('ol'),t=document.getElementById('ot'),m=document.getElementById('om');
  ol.classList.add('s');
  if(d.win){t.textContent='ESCAPARON!';t.style.color='#4ADE80';m.innerHTML='Felicitaciones!<br><br><a href="/escape" style="color:#C084FC">Jugar de nuevo</a>';}
  else{t.textContent='TIEMPO AGOTADO';t.style.color='#F87171';m.innerHTML='Intenten de nuevo<br><br><a href="/escape" style="color:#C084FC">Reintentar</a>';}
});
socket.on('hint',function(d){
  addSys('PISTA: '+d.text);
  document.getElementById('clue').textContent=d.text;
});
socket.on('error',function(d){addSys('Error: '+(d.msg||''));});
})();
</script>
</body>
</html>
