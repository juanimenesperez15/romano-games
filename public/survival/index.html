<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Supervivencia de Romano</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#111;overflow:hidden;font-family:'Outfit',sans-serif;color:#fff;touch-action:none;-webkit-user-select:none;user-select:none}
    canvas#game{display:block;position:fixed;inset:0}
    #menu{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:radial-gradient(ellipse,rgba(15,25,15,.97),rgba(5,10,5,.99));backdrop-filter:blur(12px)}
    #menu.hidden{display:none}
    .mbox{text-align:center;padding:34px 40px;border-radius:24px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);max-width:90vw;box-shadow:0 30px 80px rgba(0,0,0,.5)}
    .mbox h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(20px,5.5vw,34px);font-weight:800;margin-bottom:3px;background:linear-gradient(135deg,#4ADE80,#FBBF24,#F87171);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px}
    .mbox .sub{color:rgba(255,255,255,.2);font-size:9px;letter-spacing:3px;text-transform:uppercase;margin-bottom:24px}
    #nameInput{display:block;width:220px;max-width:80vw;margin:0 auto 14px;padding:12px 18px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;border:1.5px solid rgba(255,255,255,.06);border-radius:14px;background:rgba(255,255,255,.03);color:#fff;text-align:center;outline:none;transition:border .3s}
    #nameInput:focus{border-color:rgba(74,222,128,.35)}
    .pbtn{display:block;width:220px;max-width:80vw;margin:0 auto;padding:13px;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;border:none;border-radius:14px;background:linear-gradient(135deg,#4ADE80,#FBBF24);color:#111;cursor:pointer;letter-spacing:.5px;transition:transform .15s,box-shadow .3s}
    .pbtn:hover{box-shadow:0 6px 30px rgba(74,222,128,.25)}
    .pbtn:active{transform:scale(.96)}
    .hint{margin-top:16px;color:rgba(255,255,255,.15);font-size:8px;line-height:2.2;letter-spacing:.3px}
    #overlay{display:none;position:fixed;inset:0;z-index:90;background:rgba(5,10,5,.92);backdrop-filter:blur(8px);align-items:center;justify-content:center;text-align:center;flex-direction:column}
    #overlay.show{display:flex}
    #overlay h2{font-family:'Space Grotesk',sans-serif;font-size:clamp(24px,5vw,32px);font-weight:800;margin-bottom:6px}
    #overlay p{color:rgba(255,255,255,.35);font-size:13px}
    #hud{position:fixed;top:0;left:0;right:0;z-index:50;pointer-events:none;display:none;padding:10px 14px}
    #hud.show{display:flex;justify-content:space-between;align-items:flex-start}
    .hud-l{display:flex;flex-direction:column;gap:4px}
    .hud-r{text-align:right;display:flex;flex-direction:column;gap:3px;align-items:flex-end}
    .hp-outer{width:130px;height:12px;background:rgba(0,0,0,.6);border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,.06);box-shadow:inset 0 2px 4px rgba(0,0,0,.3)}
    .hp-inner{height:100%;border-radius:5px;transition:width .15s;box-shadow:0 0 8px rgba(74,222,128,.3)}
    #wepLabel{font-size:11px;font-weight:600;color:rgba(255,255,255,.5);letter-spacing:.3px}
    #killLabel{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:800;color:#FBBF24;text-shadow:0 0 10px rgba(251,191,36,.3)}
    #timeLabel,#aliveLabel{font-size:11px;color:rgba(255,255,255,.35)}
    #specBar{display:none;position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:55;pointer-events:none;font-size:12px;font-weight:600;color:rgba(255,255,255,.5);background:rgba(0,0,0,.55);padding:6px 18px;border-radius:12px;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.05)}
    #backBtn{position:fixed;top:8px;left:8px;z-index:60;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.3);font-size:11px;padding:6px 12px;border-radius:10px;text-decoration:none;font-family:'Outfit',sans-serif;backdrop-filter:blur(4px)}
    .joy{display:none;position:fixed;z-index:60;width:120px;height:120px}
    .joy-ring{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.25);border:2px solid rgba(255,255,255,.05);box-shadow:inset 0 2px 8px rgba(0,0,0,.2)}
    .joy-knob{position:absolute;width:48px;height:48px;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);backdrop-filter:blur(3px)}
    #jMove{bottom:14px;left:14px}
    #jMove .joy-knob{background:rgba(74,222,128,.12);border:2px solid rgba(74,222,128,.25);box-shadow:0 0 12px rgba(74,222,128,.1)}
    #jAim{bottom:14px;right:14px}
    #jAim .joy-knob{background:rgba(248,113,113,.12);border:2px solid rgba(248,113,113,.25);box-shadow:0 0 12px rgba(248,113,113,.1)}
    .joy-label{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:7px;color:rgba(255,255,255,.15);text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap}
    #mm{position:fixed;top:10px;right:10px;z-index:50;pointer-events:none;border-radius:10px;border:1px solid rgba(255,255,255,.05);background:rgba(0,0,0,.4);backdrop-filter:blur(3px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
    @media(max-width:700px){#mm{width:60px!important;height:60px!important;top:auto;bottom:140px;right:50%;transform:translateX(50%)}}
  </style>
</head>
<body>
<div id="menu"><div class="mbox">
  <h1>Supervivencia de Romano</h1>
  <div class="sub">battle royale top-down</div>
  <input type="text" id="nameInput" placeholder="Tu nombre..." maxlength="12" autofocus value="Romano">
  <button class="pbtn" id="playBtn">JUGAR</button>
  <div class="hint" id="hintText">WASD = mover &middot; Mouse = apuntar &middot; Click = disparar<br>Recoge armas del piso &middot; La zona se achica</div>
</div></div>
<div id="overlay"><h2 id="olT"></h2><p id="olM"></p></div>
<a id="backBtn" href="/">&#8592;</a>
<div id="hud">
  <div class="hud-l"><div class="hp-outer"><div class="hp-inner" id="hpBar"></div></div><div id="wepLabel"></div></div>
  <div class="hud-r"><div id="killLabel">0 kills</div><div id="timeLabel"></div><div id="aliveLabel"></div></div>
</div>
<div id="specBar"></div>
<canvas id="mm" width="90" height="90"></canvas>
<div class="joy" id="jMove"><div class="joy-ring"></div><div class="joy-knob" id="jMoveK"></div><div class="joy-label">mover</div></div>
<div class="joy" id="jAim"><div class="joy-ring"></div><div class="joy-knob" id="jAimK"></div><div class="joy-label">apuntar + disparar</div></div>
<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
(function(){
'use strict';
var c=document.getElementById('game'),ctx=c.getContext('2d');
var mm=document.getElementById('mm'),mctx=mm.getContext('2d');
var isTouch=('ontouchstart' in window)||(navigator.maxTouchPoints>0);
var socket=io('/survival',{transports:['websocket']});
var W,H,dpr=window.devicePixelRatio||1;
function resize(){W=innerWidth;H=innerHeight;c.width=W*dpr;c.height=H*dpr;c.style.width=W+'px';c.style.height=H+'px';}
resize();addEventListener('resize',resize);

var joined=false,st=null,playing=false;
var aimAngle=0,shooting=false,mouseX=W/2,mouseY=H/2;

// ── Particles ──
var particles=[];
function addParticle(x,y,col,count,spd,life){
  for(var i=0;i<count;i++){
    var a=Math.random()*Math.PI*2,v=Math.random()*spd;
    particles.push({x:x,y:y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:life||30,maxLife:life||30,col:col,r:1+Math.random()*2});
  }
}
// Screen shake
var shakeX=0,shakeY=0,shakeT=0;
function shake(amount){shakeT=amount;}

if(isTouch){
  document.getElementById('jMove').style.display='block';
  document.getElementById('jAim').style.display='block';
  document.getElementById('hintText').innerHTML='Joystick izq = mover<br>Joystick der = apuntar (mantener = disparar)<br>Recoge armas &middot; Sobrevive la zona';
}

document.getElementById('playBtn').onclick=function(){
  socket.emit('join',{name:document.getElementById('nameInput').value.trim()||'Jugador'});
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('hud').classList.add('show');
  joined=true;playing=true;
};
document.getElementById('nameInput').onkeydown=function(e){if(e.key==='Enter')document.getElementById('playBtn').click();};

var keys={};
addEventListener('keydown',function(e){keys[e.key.toLowerCase()]=true;});
addEventListener('keyup',function(e){keys[e.key.toLowerCase()]=false;});
c.addEventListener('mousemove',function(e){mouseX=e.clientX;mouseY=e.clientY;});
c.addEventListener('mousedown',function(e){if(e.button===0)shooting=true;});
c.addEventListener('mouseup',function(e){if(e.button===0)shooting=false;});
c.addEventListener('contextmenu',function(e){e.preventDefault();});

function mkJoy(el,knob,cb){
  var tid=null,ox,oy;
  el.addEventListener('touchstart',function(e){e.preventDefault();var t=e.changedTouches[0];tid=t.identifier;var r=el.getBoundingClientRect();ox=r.left+r.width/2;oy=r.top+r.height/2;cb(0,0,true);},{passive:false});
  el.addEventListener('touchmove',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++){if(e.changedTouches[i].identifier===tid){var dx=e.changedTouches[i].clientX-ox,dy=e.changedTouches[i].clientY-oy;var d=Math.sqrt(dx*dx+dy*dy),mx=42;if(d>mx){dx=dx/d*mx;dy=dy/d*mx;}knob.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';cb(dx/mx,dy/mx,true);break;}}},{passive:false});
  function up(){knob.style.transform='translate(-50%,-50%)';tid=null;cb(0,0,false);}
  el.addEventListener('touchend',function(e){for(var i=0;i<e.changedTouches.length;i++){if(e.changedTouches[i].identifier===tid){up();break;}}});
  el.addEventListener('touchcancel',up);
}
var jmx=0,jmy=0,jax=0,jay=0,aimTouching=false;
mkJoy(document.getElementById('jMove'),document.getElementById('jMoveK'),function(x,y){jmx=x;jmy=y;});
mkJoy(document.getElementById('jAim'),document.getElementById('jAimK'),function(x,y,t){jax=x;jay=y;aimTouching=t;if(Math.abs(x)>.15||Math.abs(y)>.15)aimAngle=Math.atan2(y,x);});
c.addEventListener('touchstart',function(e){e.preventDefault();},{passive:false});
c.addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});

setInterval(function(){
  if(!joined||!playing)return;
  var mx=0,my=0;
  if(isTouch){mx=jmx;my=jmy;shooting=aimTouching&&(Math.abs(jax)>.2||Math.abs(jay)>.2);}
  else{if(keys['w']||keys['arrowup'])my=-1;if(keys['s']||keys['arrowdown'])my=1;if(keys['a']||keys['arrowleft'])mx=-1;if(keys['d']||keys['arrowright'])mx=1;var l=Math.sqrt(mx*mx+my*my);if(l>1){mx/=l;my/=l;}aimAngle=Math.atan2(mouseY-H/2,mouseX-W/2);}
  socket.emit('input',{mx:mx,my:my,aa:aimAngle,sh:shooting});
},33);

// Network
var prevHp=100;
socket.on('phase',function(d){
  var ol=document.getElementById('overlay'),t=document.getElementById('olT'),m=document.getElementById('olM');
  if(d.phase==='lobby'){ol.classList.remove('show');document.getElementById('specBar').style.display='none';dp={};camX=1000;camY=1000;particles=[];}
  else if(d.phase==='playing'){ol.classList.add('show');t.textContent='SOBREVIVE';t.style.color='#4ADE80';m.textContent='';document.getElementById('specBar').style.display='none';if(isTouch){document.getElementById('jMove').style.display='block';document.getElementById('jAim').style.display='block';}playing=true;dp={};particles=[];prevHp=100;setTimeout(function(){ol.classList.remove('show');},2000);}
  else if(d.phase==='ended'){ol.classList.add('show');if(d.winner){t.textContent='GANADOR: '+d.winner.name;t.style.color='#FBBF24';m.textContent=d.winner.kills+' kills';}else{t.textContent='FIN';t.style.color='#F87171';m.textContent='';}}
});
socket.on('dead',function(d){
  document.getElementById('specBar').style.display='block';
  document.getElementById('specBar').textContent='Eliminado'+(d.killer?' por '+d.killer:'');
  if(isTouch){document.getElementById('jMove').style.display='none';document.getElementById('jAim').style.display='none';}
  shake(12);
});
socket.on('spectate',function(){document.getElementById('specBar').style.display='block';document.getElementById('specBar').textContent='Espectador';});
socket.on('s',function(s){
  // Detect damage for screen shake + particles
  if(s.me&&s.me.hp<prevHp){shake(Math.min(8,(prevHp-s.me.hp)/5));}
  if(s.me)prevHp=s.me.hp;
  st=s;
});

var LCOL={pistol:'#FBBF24',shotgun:'#F87171',rifle:'#60A5FA',sniper:'#C084FC',heal:'#4ADE80'};
var LICO={pistol:'🔫',shotgun:'💥',rifle:'🎯',sniper:'🔭',heal:'💚'};
var WNAMES={fists:'Punos',pistol:'Pistola',shotgun:'Escopeta',rifle:'Rifle',sniper:'Sniper'};
var dp={},SM=0.4,camX=1000,camY=1000;

// ── Grass texture cache ──
var grassCvs=document.createElement('canvas');grassCvs.width=120;grassCvs.height=120;
var gctx=grassCvs.getContext('2d');
gctx.fillStyle='#2a4a2a';gctx.fillRect(0,0,120,120);
for(var gi=0;gi<200;gi++){
  gctx.fillStyle='rgba('+(Math.random()>.5?'50,100,50':'30,60,30')+','+(0.1+Math.random()*0.15)+')';
  var gx=Math.random()*120,gy=Math.random()*120;
  gctx.fillRect(gx,gy,1+Math.random()*2,1+Math.random()*2);
}
var grassPat=null;

function render(){
  requestAnimationFrame(render);
  if(!st||!joined){ctx.setTransform(dpr,0,0,dpr,0,0);ctx.fillStyle='#1b2a1b';ctx.fillRect(0,0,W,H);return;}
  ctx.setTransform(dpr,0,0,dpr,0,0);

  // Shake
  if(shakeT>0){shakeX=(Math.random()-.5)*shakeT;shakeY=(Math.random()-.5)*shakeT;shakeT*=0.85;if(shakeT<0.5)shakeT=0;}else{shakeX=0;shakeY=0;}

  var me=null;for(var i=0;i<st.p.length;i++){if(st.p[i].me){me=st.p[i];break;}}
  var target=me||st.p[0]||{x:st.mc,y:st.mc};
  camX+=(target.x-camX)*0.18;camY+=(target.y-camY)*0.18;
  var ox=W/2-camX+shakeX,oy=H/2-camY+shakeY;
  if(!isTouch)aimAngle=Math.atan2(mouseY-H/2,mouseX-W/2);

  // Background with grass pattern
  if(!grassPat)grassPat=ctx.createPattern(grassCvs,'repeat');
  ctx.fillStyle=grassPat||'#2a4a2a';
  ctx.save();ctx.translate(ox%120,oy%120);ctx.fillRect(-120,-120,W+240,H+240);ctx.restore();

  // Subtle grid
  ctx.strokeStyle='rgba(0,0,0,.06)';ctx.lineWidth=1;
  var gs=50;ctx.beginPath();
  for(var gx2=(ox%gs+gs)%gs;gx2<W;gx2+=gs){ctx.moveTo(gx2,0);ctx.lineTo(gx2,H);}
  for(var gy2=(oy%gs+gs)%gs;gy2<H;gy2+=gs){ctx.moveTo(0,gy2);ctx.lineTo(W,gy2);}
  ctx.stroke();

  // Zone
  var zx=st.bx1+ox,zy=st.by1+oy,zw=st.bx2-st.bx1,zh=st.by2-st.by1;
  ctx.fillStyle='rgba(180,30,30,.12)';
  ctx.fillRect(0,0,W,zy);ctx.fillRect(0,zy+zh,W,H-zy-zh);ctx.fillRect(0,zy,zx,zh);ctx.fillRect(zx+zw,zy,W-zx-zw,zh);
  ctx.strokeStyle='rgba(239,68,68,.7)';ctx.lineWidth=2;ctx.strokeRect(zx,zy,zw,zh);

  // Obstacles
  if(st.o)for(var oi=0;oi<st.o.length;oi++){
    var ob=st.o[oi],obx=ob.x+ox,oby=ob.y+oy;
    if(obx+ob.w<-10||obx>W+10||oby+ob.h<-10||oby>H+10)continue;
    // Shadow
    ctx.fillStyle='rgba(0,0,0,.2)';
    if(ob.t==='bush'){ctx.beginPath();ctx.ellipse(obx+ob.w/2+2,oby+ob.h/2+3,ob.w/2,ob.h/2*.7,0,0,Math.PI*2);ctx.fill();}
    else if(ob.t==='rock'||ob.t==='barrel'){ctx.beginPath();ctx.ellipse(obx+ob.w/2+2,oby+ob.h/2+3,ob.w/2,ob.h/2*.7,0,0,Math.PI*2);ctx.fill();}
    else{ctx.fillRect(obx+3,oby+3,ob.w,ob.h);}

    if(ob.t==='bush'){
      ctx.fillStyle='rgba(30,100,30,.5)';ctx.beginPath();ctx.ellipse(obx+ob.w/2,oby+ob.h/2,ob.w/2,ob.h/2,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(50,140,50,.3)';ctx.beginPath();ctx.ellipse(obx+ob.w/2-2,oby+ob.h/2-2,ob.w/3,ob.h/3,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(80,180,80,.15)';ctx.beginPath();ctx.ellipse(obx+ob.w/3,oby+ob.h/3,ob.w/5,ob.h/5,0,0,Math.PI*2);ctx.fill();
    } else if(ob.t==='rock'){
      ctx.fillStyle='#3d3d45';ctx.beginPath();ctx.ellipse(obx+ob.w/2,oby+ob.h/2,ob.w/2,ob.h/2,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#4d4d58';ctx.beginPath();ctx.ellipse(obx+ob.w/2,oby+ob.h/2-1,ob.w/2-2,ob.h/2-2,0,0,Math.PI*2);ctx.fill();
      // Highlight
      ctx.fillStyle='rgba(255,255,255,.07)';ctx.beginPath();ctx.ellipse(obx+ob.w*.35,oby+ob.h*.3,ob.w*.2,ob.h*.15,-.3,0,Math.PI*2);ctx.fill();
      // Cracks
      ctx.strokeStyle='rgba(0,0,0,.15)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(obx+ob.w*.3,oby+ob.h*.5);ctx.lineTo(obx+ob.w*.6,oby+ob.h*.4);ctx.stroke();
    } else if(ob.t==='barrel'){
      ctx.fillStyle='#5a2a1a';ctx.beginPath();ctx.arc(obx+ob.w/2,oby+ob.h/2,ob.w/2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#703828';ctx.beginPath();ctx.arc(obx+ob.w/2,oby+ob.h/2-1,ob.w/2-2,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.25)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(obx+ob.w/2,oby+ob.h/2,ob.w/2-1,0,Math.PI*2);ctx.stroke();
      // Metal ring
      ctx.strokeStyle='rgba(200,200,200,.12)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(obx+ob.w/2,oby+ob.h/2,ob.w/3,0,Math.PI*2);ctx.stroke();
    } else {
      // Crate
      ctx.fillStyle='#5a4030';ctx.fillRect(obx,oby,ob.w,ob.h);
      ctx.fillStyle='#4a3525';ctx.fillRect(obx+2,oby+2,ob.w-4,ob.h-4);
      ctx.strokeStyle='#3a2515';ctx.lineWidth=1.5;ctx.strokeRect(obx,oby,ob.w,ob.h);
      // Planks
      ctx.strokeStyle='rgba(0,0,0,.1)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(obx,oby+ob.h/2);ctx.lineTo(obx+ob.w,oby+ob.h/2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(obx+ob.w/2,oby);ctx.lineTo(obx+ob.w/2,oby+ob.h);ctx.stroke();
      // Nails
      ctx.fillStyle='rgba(200,200,200,.15)';
      ctx.fillRect(obx+3,oby+3,2,2);ctx.fillRect(obx+ob.w-5,oby+3,2,2);
      ctx.fillRect(obx+3,oby+ob.h-5,2,2);ctx.fillRect(obx+ob.w-5,oby+ob.h-5,2,2);
    }
  }

  // Loot
  if(st.l)for(var li=0;li<st.l.length;li++){
    var lo=st.l[li],lx=lo.x+ox,ly=lo.y+oy;
    if(lx<-20||lx>W+20||ly<-20||ly>H+20)continue;
    var t=Date.now()*.003;
    var bob=Math.sin(t+li)*2;
    // Glow
    ctx.beginPath();ctx.arc(lx,ly+bob,14,0,Math.PI*2);ctx.fillStyle=LCOL[lo.t]||'#fff';ctx.globalAlpha=.08;ctx.fill();
    ctx.beginPath();ctx.arc(lx,ly+bob,9,0,Math.PI*2);ctx.fillStyle=LCOL[lo.t]||'#fff';ctx.globalAlpha=.2;ctx.fill();
    // Bg circle
    ctx.beginPath();ctx.arc(lx,ly+bob,8,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.4)';ctx.globalAlpha=1;ctx.fill();
    // Icon
    ctx.font='11px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(LICO[lo.t]||'?',lx,ly+bob);ctx.textBaseline='alphabetic';
    ctx.globalAlpha=1;
  }

  // Players - humans and zombies
  if(st.p)for(var pi=0;pi<st.p.length;pi++){
    var pl=st.p[pi],k=pl.n+'_'+pi;
    if(!dp[k])dp[k]={x:pl.x,y:pl.y};
    dp[k].x+=(pl.x-dp[k].x)*SM;dp[k].y+=(pl.y-dp[k].y)*SM;
    var px=dp[k].x+ox,py=dp[k].y+oy;
    if(px<-40||px>W+40||py<-40||py>H+40)continue;
    var isMe=!!pl.me,isBot=!!pl.bot;
    var ga=pl.a;

    // Shadow
    ctx.beginPath();ctx.ellipse(px,py+5,11,6,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.25)';ctx.fill();

    // ── Body (torso) ──
    var skinCol=isBot?'#5a7a5a':'#e8c8a0'; // zombie green vs human skin
    var shirtCol=isMe?'#2d6b3e':(isBot?'#3a4a3a':'#3a5a8a');
    // Torso
    ctx.beginPath();ctx.ellipse(px,py,10,12,0,0,Math.PI*2);ctx.fillStyle=shirtCol;ctx.fill();

    // ── Arms (2 circles at sides based on aim) ──
    var armOff=Math.PI/2.2;
    for(var ai2=0;ai2<2;ai2++){
      var side=ai2===0?-1:1;
      var ax=px+Math.cos(ga+armOff*side)*12,ay=py+Math.sin(ga+armOff*side)*12;
      ctx.beginPath();ctx.arc(ax,ay,5,0,Math.PI*2);
      ctx.fillStyle=skinCol;ctx.fill();
    }

    // ── Gun (from front arm) ──
    var gx1=px+Math.cos(ga)*14,gy1=py+Math.sin(ga)*14;
    var gx2=px+Math.cos(ga)*28,gy2=py+Math.sin(ga)*28;
    ctx.strokeStyle=isBot?'#555':'#444';ctx.lineWidth=4;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(gx1,gy1);ctx.lineTo(gx2,gy2);ctx.stroke();
    ctx.lineCap='butt';

    // ── Head ──
    var headY=py-2;
    ctx.beginPath();ctx.arc(px,headY,8,0,Math.PI*2);ctx.fillStyle=skinCol;ctx.fill();

    if(isBot){
      // Zombie: red eyes, mouth line
      var eOff=3,eY=headY-1;
      ctx.beginPath();ctx.arc(px-eOff,eY,2,0,Math.PI*2);ctx.fillStyle='#c00';ctx.fill();
      ctx.beginPath();ctx.arc(px+eOff,eY,2,0,Math.PI*2);ctx.fillStyle='#c00';ctx.fill();
      // Mouth
      ctx.strokeStyle='#3a2a2a';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(px-3,headY+4);ctx.lineTo(px,headY+5);ctx.lineTo(px+3,headY+4);ctx.stroke();
    } else {
      // Human: normal eyes, smile
      var eOff2=3,eY2=headY-1;
      ctx.beginPath();ctx.arc(px-eOff2,eY2,1.5,0,Math.PI*2);ctx.fillStyle='#333';ctx.fill();
      ctx.beginPath();ctx.arc(px+eOff2,eY2,1.5,0,Math.PI*2);ctx.fillStyle='#333';ctx.fill();
      // Hair
      ctx.beginPath();ctx.ellipse(px,headY-6,7,4,0,Math.PI,Math.PI*2);
      ctx.fillStyle=isMe?'#3a2a1a':'#2a1a0a';ctx.fill();
    }

    // HP bar
    var bw=30,bh=4,bxx=px-bw/2,byy=py-22;
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(bxx-1,byy-1,bw+2,bh+2);
    var pct=pl.hp/pl.mhp;
    ctx.fillStyle=pct>.5?'#4ADE80':pct>.25?'#FBBF24':'#F87171';
    ctx.fillRect(bxx,byy,bw*pct,bh);

    // Name
    ctx.font='600 9px Outfit';ctx.textAlign='center';
    ctx.fillStyle=isMe?'rgba(74,222,128,.7)':(isBot?'rgba(255,100,100,.5)':'rgba(255,255,255,.45)');
    ctx.fillText(pl.n,px,py-26);

    // Me indicator
    if(isMe){
      ctx.beginPath();ctx.moveTo(px,py-32);ctx.lineTo(px-4,py-28);ctx.lineTo(px+4,py-28);ctx.closePath();
      ctx.fillStyle='rgba(74,222,128,.5)';ctx.fill();
    }
  }

  // Bullets
  if(st.b)for(var bi=0;bi<st.b.length;bi++){
    var bl=st.b[bi],bx=bl.x+ox,by=bl.y+oy;
    if(bx<-5||bx>W+5||by<-5||by>H+5)continue;
    // Trail
    ctx.beginPath();ctx.arc(bx,by,5,0,Math.PI*2);ctx.fillStyle='rgba(251,191,36,.1)';ctx.fill();
    // Bullet
    ctx.beginPath();ctx.arc(bx,by,2.5,0,Math.PI*2);ctx.fillStyle='#FBBF24';ctx.fill();
    ctx.beginPath();ctx.arc(bx,by,1.5,0,Math.PI*2);ctx.fillStyle='#fff';ctx.globalAlpha=.6;ctx.fill();
    ctx.globalAlpha=1;
  }

  // Particles
  for(var pri=particles.length-1;pri>=0;pri--){
    var pa=particles[pri];
    pa.x+=pa.vx;pa.y+=pa.vy;pa.vx*=.95;pa.vy*=.95;pa.life--;
    if(pa.life<=0){particles.splice(pri,1);continue;}
    var pax=pa.x+ox,pay=pa.y+oy;
    if(pax<-10||pax>W+10||pay<-10||pay>H+10)continue;
    ctx.beginPath();ctx.arc(pax,pay,pa.r*(pa.life/pa.maxLife),0,Math.PI*2);
    ctx.fillStyle=pa.col;ctx.globalAlpha=pa.life/pa.maxLife*.7;ctx.fill();
  }
  ctx.globalAlpha=1;

  // Crosshair
  if(!isTouch){
    ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(mouseX,mouseY,12,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=1;
    var ch=16;
    ctx.beginPath();ctx.moveTo(mouseX-ch,mouseY);ctx.lineTo(mouseX-7,mouseY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mouseX+7,mouseY);ctx.lineTo(mouseX+ch,mouseY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mouseX,mouseY-ch);ctx.lineTo(mouseX,mouseY-7);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mouseX,mouseY+7);ctx.lineTo(mouseX,mouseY+ch);ctx.stroke();
    // Center dot
    ctx.beginPath();ctx.arc(mouseX,mouseY,1.5,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.5)';ctx.fill();
  }

  // HUD
  if(st.me){
    var pct2=st.me.hp/st.me.mhp;
    var bar=document.getElementById('hpBar');
    bar.style.width=Math.max(0,pct2*100)+'%';
    bar.style.background=pct2>.5?'linear-gradient(90deg,#22C55E,#4ADE80)':pct2>.25?'linear-gradient(90deg,#D97706,#FBBF24)':'linear-gradient(90deg,#DC2626,#F87171)';
    bar.style.boxShadow='0 0 '+(pct2<.3?'10':'6')+'px '+(pct2>.5?'rgba(74,222,128,.3)':pct2>.25?'rgba(251,191,36,.3)':'rgba(248,113,113,.4)');
    document.getElementById('wepLabel').textContent=(WNAMES[st.me.w]||st.me.w)+(st.me.w!=='fists'?' ('+st.me.ammo+')':'');
    document.getElementById('killLabel').textContent=st.me.k+' kills';
  }
  document.getElementById('timeLabel').textContent=Math.floor(st.tl/60)+':'+(st.tl%60<10?'0':'')+st.tl%60;
  document.getElementById('aliveLabel').textContent='Vivos: '+st.ac;

  // Minimap
  var mw=mm.width,mh=mm.height;
  mctx.clearRect(0,0,mw,mh);
  mctx.fillStyle='rgba(35,60,35,.7)';mctx.fillRect(0,0,mw,mh);
  var zmx=(st.bx1/2000)*mw,zmy=(st.by1/2000)*mh,zmw=(st.ms/2000)*mw,zmh=(st.ms/2000)*mh;
  mctx.fillStyle='rgba(180,30,30,.2)';mctx.fillRect(0,0,mw,mh);
  mctx.clearRect(zmx,zmy,zmw,zmh);mctx.fillStyle='rgba(35,60,35,.7)';mctx.fillRect(zmx,zmy,zmw,zmh);
  mctx.strokeStyle='rgba(239,68,68,.6)';mctx.lineWidth=1;mctx.strokeRect(zmx,zmy,zmw,zmh);
  if(st.p)for(var mi=0;mi<st.p.length;mi++){
    var mp=st.p[mi];
    mctx.beginPath();mctx.arc((mp.x/2000)*mw,(mp.y/2000)*mh,mp.me?3.5:1.5,0,Math.PI*2);
    mctx.fillStyle=mp.me?'#4ADE80':(mp.bot?'#777':'#60A5FA');mctx.fill();
    if(mp.me){mctx.strokeStyle='rgba(74,222,128,.5)';mctx.lineWidth=1;mctx.stroke();}
  }
}
render();
})();
</script>
</body>
</html>
