<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Supervivencia de Romano</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#1b2a1b;overflow:hidden;font-family:'Outfit',sans-serif;color:#fff;touch-action:none;-webkit-user-select:none;user-select:none}
    canvas#game{display:block;position:fixed;inset:0}

    /* Menu */
    #menu{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:radial-gradient(ellipse,rgba(20,30,20,.96),rgba(10,15,10,.98));backdrop-filter:blur(10px)}
    #menu.hidden{display:none}
    .mbox{text-align:center;padding:32px 38px;border-radius:22px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.4)}
    .mbox h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(22px,6vw,36px);font-weight:800;margin-bottom:4px;background:linear-gradient(135deg,#4ADE80,#FBBF24,#F87171);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .mbox .sub{color:rgba(255,255,255,.25);font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:22px}
    #nameInput{display:block;width:220px;max-width:80vw;margin:0 auto 14px;padding:11px 16px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;border:2px solid rgba(255,255,255,.08);border-radius:14px;background:rgba(255,255,255,.04);color:#fff;text-align:center;outline:none}
    #nameInput:focus{border-color:rgba(74,222,128,.4)}
    .pbtn{display:block;width:220px;max-width:80vw;margin:0 auto;padding:12px;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;border:none;border-radius:14px;background:linear-gradient(135deg,#4ADE80,#FBBF24);color:#1b2a1b;cursor:pointer;letter-spacing:.5px}
    .pbtn:active{transform:scale(.97)}
    .hint{margin-top:14px;color:rgba(255,255,255,.18);font-size:9px;line-height:2}

    /* Overlay */
    #overlay{display:none;position:fixed;inset:0;z-index:90;background:rgba(10,15,10,.9);backdrop-filter:blur(6px);align-items:center;justify-content:center;text-align:center;flex-direction:column}
    #overlay.show{display:flex}
    #overlay h2{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:800;margin-bottom:6px}
    #overlay p{color:rgba(255,255,255,.4);font-size:14px}

    /* HUD */
    #hud{position:fixed;top:0;left:0;right:0;z-index:50;pointer-events:none;display:none;padding:10px 14px}
    #hud.show{display:flex;justify-content:space-between;align-items:flex-start}
    .hud-l{display:flex;flex-direction:column;gap:3px}
    .hud-r{text-align:right;display:flex;flex-direction:column;gap:2px;align-items:flex-end}
    .hp-outer{width:120px;height:10px;background:rgba(0,0,0,.5);border-radius:5px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
    .hp-inner{height:100%;border-radius:4px;transition:width .15s,background .3s}
    #wepLabel{font-size:11px;font-weight:600;color:rgba(255,255,255,.55)}
    #killLabel{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#FBBF24}
    #timeLabel{font-size:11px;color:rgba(255,255,255,.4)}
    #aliveLabel{font-size:11px;color:rgba(255,255,255,.35)}
    #specBar{display:none;position:fixed;top:48px;left:50%;transform:translateX(-50%);z-index:55;pointer-events:none;font-size:12px;color:rgba(255,255,255,.45);background:rgba(0,0,0,.5);padding:5px 16px;border-radius:10px;backdrop-filter:blur(4px)}
    #backBtn{position:fixed;top:8px;left:8px;z-index:60;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.35);font-size:11px;padding:5px 10px;border-radius:8px;text-decoration:none;font-family:'Outfit',sans-serif}

    /* Joysticks */
    .joy{display:none;position:fixed;z-index:60;width:120px;height:120px}
    .joy-ring{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.2);border:2px solid rgba(255,255,255,.06)}
    .joy-knob{position:absolute;width:46px;height:46px;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);backdrop-filter:blur(2px)}
    #jMove{bottom:14px;left:14px}
    #jMove .joy-knob{background:rgba(74,222,128,.15);border:2px solid rgba(74,222,128,.3)}
    #jAim{bottom:14px;right:14px}
    #jAim .joy-knob{background:rgba(248,113,113,.15);border:2px solid rgba(248,113,113,.3)}
    .joy-label{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:8px;color:rgba(255,255,255,.2);text-transform:uppercase;letter-spacing:1px;white-space:nowrap}

    /* Minimap */
    #mm{position:fixed;top:10px;right:10px;z-index:50;pointer-events:none;border-radius:8px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.35);backdrop-filter:blur(2px)}
    @media(max-width:700px){#mm{width:65px!important;height:65px!important;top:auto;bottom:140px;right:50%;transform:translateX(50%)}}
  </style>
</head>
<body>
<div id="menu"><div class="mbox">
  <h1>Supervivencia de Romano</h1>
  <div class="sub">battle royale top-down</div>
  <input type="text" id="nameInput" placeholder="Tu nombre..." maxlength="12" autofocus value="Romano">
  <button class="pbtn" id="playBtn">JUGAR</button>
  <div class="hint" id="hintText">WASD = mover &middot; Mouse = apuntar &middot; Click = disparar<br>Recoge armas del piso &middot; La zona se achica</div>
</div></div>
<div id="overlay"><h2 id="olT"></h2><p id="olM"></p></div>
<a id="backBtn" href="/">&#8592;</a>
<div id="hud">
  <div class="hud-l"><div class="hp-outer"><div class="hp-inner" id="hpBar"></div></div><div id="wepLabel"></div></div>
  <div class="hud-r"><div id="killLabel">0 kills</div><div id="timeLabel"></div><div id="aliveLabel"></div></div>
</div>
<div id="specBar"></div>
<canvas id="mm" width="90" height="90"></canvas>
<div class="joy" id="jMove"><div class="joy-ring"></div><div class="joy-knob" id="jMoveK"></div><div class="joy-label">mover</div></div>
<div class="joy" id="jAim"><div class="joy-ring"></div><div class="joy-knob" id="jAimK"></div><div class="joy-label">apuntar + disparar</div></div>
<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
(function(){
'use strict';
var c=document.getElementById('game'),ctx=c.getContext('2d');
var mm=document.getElementById('mm'),mctx=mm.getContext('2d');
var isTouch=('ontouchstart' in window)||(navigator.maxTouchPoints>0);
var socket=io('/survival',{transports:['websocket']});
var W,H,dpr=window.devicePixelRatio||1;
function resize(){W=innerWidth;H=innerHeight;c.width=W*dpr;c.height=H*dpr;c.style.width=W+'px';c.style.height=H+'px';}
resize();addEventListener('resize',resize);

var joined=false,st=null,playing=false;
var moveX=0,moveY=0,aimAngle=0,shooting=false,mouseX=W/2,mouseY=H/2;

// Mobile setup
if(isTouch){
  document.getElementById('jMove').style.display='block';
  document.getElementById('jAim').style.display='block';
  document.getElementById('hintText').innerHTML='Joystick izq = mover<br>Joystick der = apuntar (mantener = disparar)<br>Recoge armas &middot; Sobrevive la zona';
}

// Menu
document.getElementById('playBtn').onclick=function(){
  socket.emit('join',{name:document.getElementById('nameInput').value.trim()||'Jugador'});
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('hud').classList.add('show');
  joined=true;playing=true;
};
document.getElementById('nameInput').onkeydown=function(e){if(e.key==='Enter')document.getElementById('playBtn').click();};

// Desktop
var keys={};
addEventListener('keydown',function(e){keys[e.key.toLowerCase()]=true;});
addEventListener('keyup',function(e){keys[e.key.toLowerCase()]=false;});
c.addEventListener('mousemove',function(e){mouseX=e.clientX;mouseY=e.clientY;});
c.addEventListener('mousedown',function(e){if(e.button===0)shooting=true;});
c.addEventListener('mouseup',function(e){if(e.button===0)shooting=false;});
c.addEventListener('contextmenu',function(e){e.preventDefault();});

// Joystick helper
function mkJoy(el,knob,cb){
  var tid=null,ox,oy;
  el.addEventListener('touchstart',function(e){e.preventDefault();var t=e.changedTouches[0];tid=t.identifier;var r=el.getBoundingClientRect();ox=r.left+r.width/2;oy=r.top+r.height/2;cb(0,0,true);},{passive:false});
  el.addEventListener('touchmove',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++){if(e.changedTouches[i].identifier===tid){var dx=e.changedTouches[i].clientX-ox,dy=e.changedTouches[i].clientY-oy;var d=Math.sqrt(dx*dx+dy*dy),mx=42;if(d>mx){dx=dx/d*mx;dy=dy/d*mx;}knob.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';cb(dx/mx,dy/mx,true);break;}}},{passive:false});
  function up(){knob.style.transform='translate(-50%,-50%)';tid=null;cb(0,0,false);}
  el.addEventListener('touchend',function(e){for(var i=0;i<e.changedTouches.length;i++){if(e.changedTouches[i].identifier===tid){up();break;}}});
  el.addEventListener('touchcancel',up);
}

var jmx=0,jmy=0,jax=0,jay=0,aimTouching=false;
mkJoy(document.getElementById('jMove'),document.getElementById('jMoveK'),function(x,y){jmx=x;jmy=y;});
mkJoy(document.getElementById('jAim'),document.getElementById('jAimK'),function(x,y,touching){
  jax=x;jay=y;aimTouching=touching;
  if(Math.abs(x)>0.15||Math.abs(y)>0.15) aimAngle=Math.atan2(y,x);
});

c.addEventListener('touchstart',function(e){e.preventDefault();},{passive:false});
c.addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});

// Input loop
setInterval(function(){
  if(!joined||!playing)return;
  var mx=0,my=0;
  if(isTouch){
    mx=jmx;my=jmy;
    shooting=aimTouching&&(Math.abs(jax)>0.2||Math.abs(jay)>0.2);
  } else {
    if(keys['w']||keys['arrowup'])my=-1;if(keys['s']||keys['arrowdown'])my=1;
    if(keys['a']||keys['arrowleft'])mx=-1;if(keys['d']||keys['arrowright'])mx=1;
    var len=Math.sqrt(mx*mx+my*my);if(len>1){mx/=len;my/=len;}
    aimAngle=Math.atan2(mouseY-H/2,mouseX-W/2);
  }
  socket.emit('input',{mx:mx,my:my,aa:aimAngle,sh:shooting});
},33);

// Network
socket.on('phase',function(d){
  var ol=document.getElementById('overlay'),t=document.getElementById('olT'),m=document.getElementById('olM');
  if(d.phase==='lobby'){
    ol.classList.remove('show');
    document.getElementById('specBar').style.display='none';
    dp={};camX=1000;camY=1000; // reset smooth positions
  } else if(d.phase==='playing'){
    ol.classList.add('show');t.textContent='SOBREVIVE';t.style.color='#4ADE80';m.textContent='';
    // Reactivate controls (fixes post-spectate bug)
    document.getElementById('specBar').style.display='none';
    if(isTouch){document.getElementById('jMove').style.display='block';document.getElementById('jAim').style.display='block';}
    playing=true;dp={};
    setTimeout(function(){ol.classList.remove('show');},2000);
  } else if(d.phase==='ended'){
    ol.classList.add('show');
    if(d.winner){t.textContent='GANADOR: '+d.winner.name;t.style.color='#FBBF24';m.textContent=d.winner.kills+' kills';}
    else{t.textContent='FIN';t.style.color='#F87171';m.textContent='';}
  }
});
socket.on('dead',function(d){
  document.getElementById('specBar').style.display='block';
  document.getElementById('specBar').textContent='Moriste'+(d.killer?' - '+d.killer:'');
  if(isTouch){document.getElementById('jMove').style.display='none';document.getElementById('jAim').style.display='none';}
});
socket.on('spectate',function(){document.getElementById('specBar').style.display='block';document.getElementById('specBar').textContent='Espectador';});
socket.on('s',function(s){st=s;});

// Colors
var LCOL={pistol:'#FBBF24',shotgun:'#F87171',rifle:'#60A5FA',sniper:'#C084FC',heal:'#4ADE80'};
var LICO={pistol:'🔫',shotgun:'💥',rifle:'🎯',sniper:'🔭',heal:'💚'};
var WNAMES={fists:'Punos',pistol:'Pistola',shotgun:'Escopeta',rifle:'Rifle',sniper:'Sniper'};

// Smooth
var dp={};var SM=0.25;
var camX=1000,camY=1000;

function render(){
  requestAnimationFrame(render);
  if(!st||!joined){ctx.setTransform(dpr,0,0,dpr,0,0);ctx.fillStyle='#1b2a1b';ctx.fillRect(0,0,W,H);return;}
  ctx.setTransform(dpr,0,0,dpr,0,0);

  // Camera
  var me=null;
  for(var i=0;i<st.p.length;i++){if(st.p[i].me){me=st.p[i];break;}}
  var target=me||st.p[0]||{x:st.mc,y:st.mc};
  camX+=(target.x-camX)*0.12;camY+=(target.y-camY)*0.12;
  var ox=W/2-camX,oy=H/2-camY;

  if(!isTouch)aimAngle=Math.atan2(mouseY-H/2,mouseX-W/2);

  // Background
  ctx.fillStyle='#2a4a2a';ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='rgba(255,255,255,.025)';ctx.lineWidth=1;
  var gs=50;
  ctx.beginPath();
  for(var gx=(ox%gs+gs)%gs;gx<W;gx+=gs){ctx.moveTo(gx,0);ctx.lineTo(gx,H);}
  for(var gy=(oy%gs+gs)%gs;gy<H;gy+=gs){ctx.moveTo(0,gy);ctx.lineTo(W,gy);}
  ctx.stroke();

  // Zone
  var zx=st.bx1+ox,zy=st.by1+oy,zw=st.bx2-st.bx1,zh=st.by2-st.by1;
  ctx.fillStyle='rgba(220,38,38,.1)';
  ctx.fillRect(0,0,W,zy);ctx.fillRect(0,zy+zh,W,H-zy-zh);
  ctx.fillRect(0,zy,zx,zh);ctx.fillRect(zx+zw,zy,W-zx-zw,zh);
  ctx.strokeStyle='rgba(239,68,68,.6)';ctx.lineWidth=2;ctx.strokeRect(zx,zy,zw,zh);

  // Obstacles
  if(st.o)for(var oi=0;oi<st.o.length;oi++){
    var ob=st.o[oi],obx=ob.x+ox,oby=ob.y+oy;
    if(obx+ob.w<-10||obx>W+10||oby+ob.h<-10||oby>H+10)continue;
    if(ob.t==='bush'){
      // Green semi-transparent bush
      ctx.fillStyle='rgba(34,120,34,.45)';
      ctx.beginPath();ctx.ellipse(obx+ob.w/2,oby+ob.h/2,ob.w/2,ob.h/2,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(50,160,50,.25)';
      ctx.beginPath();ctx.ellipse(obx+ob.w/2-3,oby+ob.h/2-3,ob.w/3,ob.h/3,0,0,Math.PI*2);ctx.fill();
    } else if(ob.t==='rock'){
      // Dark grey rock with rough look
      ctx.fillStyle='#4a4a52';
      ctx.beginPath();ctx.ellipse(obx+ob.w/2,oby+ob.h/2+2,ob.w/2,ob.h/2,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#5a5a65';
      ctx.beginPath();ctx.ellipse(obx+ob.w/2,oby+ob.h/2,ob.w/2-1,ob.h/2-1,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.06)';
      ctx.beginPath();ctx.ellipse(obx+ob.w/3,oby+ob.h/3,ob.w/4,ob.h/4,0,0,Math.PI*2);ctx.fill();
    } else if(ob.t==='barrel'){
      // Red-brown barrel circle
      ctx.fillStyle='#6b3a2a';
      ctx.beginPath();ctx.arc(obx+ob.w/2,oby+ob.h/2+1,ob.w/2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#7d4535';
      ctx.beginPath();ctx.arc(obx+ob.w/2,oby+ob.h/2,ob.w/2-1,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(obx+ob.w/2,oby+ob.h/2,ob.w/2-1,0,Math.PI*2);ctx.stroke();
    } else {
      // Wooden crate
      ctx.fillStyle='#5a4030';ctx.fillRect(obx,oby,ob.w,ob.h);
      ctx.strokeStyle='#3d2a1a';ctx.lineWidth=1.5;ctx.strokeRect(obx,oby,ob.w,ob.h);
      // Cross pattern
      ctx.strokeStyle='rgba(0,0,0,.15)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(obx,oby);ctx.lineTo(obx+ob.w,oby+ob.h);ctx.stroke();
      ctx.beginPath();ctx.moveTo(obx+ob.w,oby);ctx.lineTo(obx,oby+ob.h);ctx.stroke();
    }
  }

  // Loot
  if(st.l)for(var li=0;li<st.l.length;li++){
    var lo=st.l[li],lx=lo.x+ox,ly=lo.y+oy;
    if(lx<-20||lx>W+20||ly<-20||ly>H+20)continue;
    // Glow
    ctx.beginPath();ctx.arc(lx,ly,12,0,Math.PI*2);ctx.fillStyle=LCOL[lo.t]||'#fff';ctx.globalAlpha=0.15;ctx.fill();
    ctx.beginPath();ctx.arc(lx,ly,8,0,Math.PI*2);ctx.fillStyle=LCOL[lo.t]||'#fff';ctx.globalAlpha=0.4;ctx.fill();
    ctx.globalAlpha=1;ctx.font='11px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(LICO[lo.t]||'?',lx,ly);ctx.textBaseline='alphabetic';
  }

  // Players
  if(st.p)for(var pi=0;pi<st.p.length;pi++){
    var pl=st.p[pi],k=pl.n+'_'+pi;
    if(!dp[k])dp[k]={x:pl.x,y:pl.y};
    dp[k].x+=(pl.x-dp[k].x)*SM;dp[k].y+=(pl.y-dp[k].y)*SM;
    var px=dp[k].x+ox,py=dp[k].y+oy;
    if(px<-40||px>W+40||py<-40||py>H+40)continue;

    var isMe=!!pl.me;
    var col=isMe?'#4ADE80':(pl.bot?'#8B8B8B':'#60A5FA');

    // Shadow
    ctx.beginPath();ctx.arc(px,py+2,13,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.25)';ctx.fill();
    // Body
    ctx.beginPath();ctx.arc(px,py,14,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
    // Outline
    ctx.beginPath();ctx.arc(px,py,14,0,Math.PI*2);ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=2;ctx.stroke();
    // Inner highlight
    ctx.beginPath();ctx.arc(px-3,py-3,6,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.12)';ctx.fill();

    // Gun
    var gunCol=isMe?'#3a9a3a':(pl.bot?'#666':'#4080c0');
    ctx.strokeStyle=gunCol;ctx.lineWidth=5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(px+Math.cos(pl.a)*10,py+Math.sin(pl.a)*10);
    ctx.lineTo(px+Math.cos(pl.a)*24,py+Math.sin(pl.a)*24);ctx.stroke();
    ctx.lineCap='butt';

    // HP bar
    var bw=30,bh=4,bx=px-bw/2,by=py-24;
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(bx-1,by-1,bw+2,bh+2);
    var pct=pl.hp/pl.mhp;
    ctx.fillStyle=pct>.5?'#4ADE80':pct>.25?'#FBBF24':'#F87171';
    ctx.fillRect(bx,by,bw*pct,bh);

    // Name
    ctx.font='600 9px Outfit';ctx.textAlign='center';
    ctx.fillStyle='rgba(255,255,255,.55)';ctx.fillText(pl.n,px,py-28);
  }

  // Bullets
  if(st.b){
    for(var bi=0;bi<st.b.length;bi++){
      var bl=st.b[bi],bx=bl.x+ox,by=bl.y+oy;
      if(bx<-5||bx>W+5||by<-5||by>H+5)continue;
      ctx.beginPath();ctx.arc(bx,by,3,0,Math.PI*2);ctx.fillStyle='#FBBF24';ctx.fill();
      ctx.beginPath();ctx.arc(bx,by,5,0,Math.PI*2);ctx.fillStyle='rgba(251,191,36,.15)';ctx.fill();
    }
  }

  // Crosshair
  if(!isTouch){
    ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(mouseX,mouseY,10,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mouseX-14,mouseY);ctx.lineTo(mouseX-6,mouseY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mouseX+6,mouseY);ctx.lineTo(mouseX+14,mouseY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mouseX,mouseY-14);ctx.lineTo(mouseX,mouseY-6);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mouseX,mouseY+6);ctx.lineTo(mouseX,mouseY+14);ctx.stroke();
  }

  // HUD
  if(st.me){
    var hp=st.me.hp,mhp=st.me.mhp,pct2=hp/mhp;
    var bar=document.getElementById('hpBar');
    bar.style.width=Math.max(0,pct2*100)+'%';
    bar.style.background=pct2>.5?'#4ADE80':pct2>.25?'#FBBF24':'#F87171';
    var wn=WNAMES[st.me.w]||st.me.w;
    document.getElementById('wepLabel').textContent=wn+(st.me.w!=='fists'?' ('+st.me.ammo+')':'');
    document.getElementById('killLabel').textContent=st.me.k+' kills';
  }
  document.getElementById('timeLabel').textContent=Math.floor(st.tl/60)+':'+(st.tl%60<10?'0':'')+st.tl%60;
  document.getElementById('aliveLabel').textContent='Vivos: '+st.ac;

  // Minimap
  var mw=mm.width,mh=mm.height;
  mctx.clearRect(0,0,mw,mh);
