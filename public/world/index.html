<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Imperio de Romano</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0e1a;font-family:'Outfit',sans-serif;color:#fff;height:100vh;overflow:hidden;touch-action:manipulation;-webkit-user-select:none;user-select:none}

    /* Lobby */
    #lobby{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:radial-gradient(ellipse,rgba(10,14,26,.97),rgba(5,7,13,.99));overflow-y:auto;padding:14px}
    #lobby.hidden{display:none}
    .lb{text-align:center;padding:24px 28px;border-radius:20px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);max-width:520px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.5)}
    .lb h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(22px,5vw,32px);font-weight:800;margin-bottom:4px;background:linear-gradient(135deg,#60A5FA,#A78BFA,#F472B6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .lb .sub{color:rgba(255,255,255,.2);font-size:9px;letter-spacing:3px;text-transform:uppercase;margin-bottom:18px}
    #nameInput{display:block;width:240px;max-width:80vw;margin:0 auto 12px;padding:11px 16px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;border:1.5px solid rgba(255,255,255,.06);border-radius:12px;background:rgba(255,255,255,.03);color:#fff;text-align:center;outline:none}
    .btn{padding:10px 18px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;border:none;border-radius:10px;cursor:pointer;letter-spacing:.3px}
    .btn-pri{background:linear-gradient(135deg,#60A5FA,#A78BFA);color:#0a0e1a}
    .btn-sec{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.08)}
    .btn:active{transform:scale(.96)}
    .row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}
    .opt{padding:8px 14px;border-radius:10px;border:1.5px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);color:rgba(255,255,255,.5);cursor:pointer;font-size:11px;font-weight:600;-webkit-tap-highlight-color:transparent}
    .opt.sel{border-color:#A78BFA;color:#A78BFA;background:rgba(167,139,250,.08)}
    .lbl{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.25);margin:14px 0 6px}

    /* Mini map for country selection */
    #miniMap{display:block;margin:0 auto 8px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);cursor:pointer;width:100%;max-width:480px;height:auto}
    #selCountry{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px;background:rgba(167,139,250,.06);border:1px solid rgba(167,139,250,.15);border-radius:12px;margin:8px 0;min-height:46px}
    #selFlag{font-size:32px}
    #selName{font-weight:700;color:#A78BFA;font-size:14px}
    #selStats{font-size:10px;color:rgba(255,255,255,.4);margin-left:6px}

    #lobbyPlayers{display:flex;gap:5px;justify-content:center;margin:10px 0;flex-wrap:wrap}
    .lpp{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;color:#0a0e1a}

    /* Game UI */
    #game{display:none;position:fixed;inset:0;flex-direction:column}
    #game.show{display:flex}
    #topBar{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(0,0,0,.4);border-bottom:1px solid rgba(255,255,255,.04);flex-shrink:0}
    #turnLabel{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700}
    #timeLabel{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:800;color:#A78BFA}
    #backHome{background:none;border:none;color:rgba(255,255,255,.3);font-size:14px;cursor:pointer;padding:4px}

    #mainArea{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column}
    #mapWrap{flex:1;position:relative;overflow:hidden}
    canvas#worldMap{display:block;width:100%;height:100%}

    /* Side panel */
    #panel{position:absolute;right:8px;top:8px;width:240px;max-height:calc(100% - 16px);background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:12px;backdrop-filter:blur(8px);overflow-y:auto;z-index:10}
    #panelFlag{font-size:36px;text-align:center}
    #panelName{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:800;text-align:center;margin-bottom:6px}
    .stat{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.6);padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)}
    .stat .v{font-weight:700;color:#fff}
    .actions{margin-top:8px;display:flex;flex-direction:column;gap:5px}
    .actbtn{padding:7px 10px;font-size:11px;font-weight:600;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:rgba(255,255,255,.7);cursor:pointer;text-align:left}
    .actbtn:active{background:rgba(167,139,250,.15)}

    /* Chat at bottom */
    #chat{position:absolute;left:8px;bottom:8px;width:280px;max-width:calc(100% - 16px);height:140px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.06);border-radius:12px;display:flex;flex-direction:column;backdrop-filter:blur(6px);z-index:10}
    #chatMsgs{flex:1;overflow-y:auto;padding:6px 10px;font-size:11px;line-height:1.4}
    .cmsg{margin:1px 0}.cmsg .n{font-weight:700;margin-right:4px}
    .csys{color:rgba(167,139,250,.5);font-style:italic;font-size:10px}
    #chatForm{display:flex;gap:4px;padding:6px;border-top:1px solid rgba(255,255,255,.04)}
    #chatInput{flex:1;padding:6px 10px;font-size:11px;border:1px solid rgba(255,255,255,.05);border-radius:6px;background:rgba(255,255,255,.03);color:#fff;outline:none;font-family:'Outfit',sans-serif}
    #chatSend{padding:6px 10px;font-size:10px;font-weight:700;border:none;border-radius:6px;background:rgba(167,139,250,.15);color:#A78BFA;cursor:pointer;font-family:'Space Grotesk',sans-serif}

    /* Overlay */
    #overlay{display:none;position:fixed;inset:0;z-index:90;background:rgba(5,7,13,.94);backdrop-filter:blur(8px);align-items:center;justify-content:center;text-align:center;flex-direction:column;padding:20px}
    #overlay.show{display:flex}
    #overlay h2{font-family:'Space Grotesk',sans-serif;font-size:clamp(22px,5vw,30px);font-weight:800;margin-bottom:6px}
    #overlay p{color:rgba(255,255,255,.4);font-size:13px}

    @media(max-width:700px){
      #panel{width:200px;font-size:10px;padding:8px;top:4px;right:4px}
      #chat{width:calc(100% - 16px);height:110px;left:8px;right:8px;bottom:4px}
      #panelFlag{font-size:28px}
      #panelName{font-size:12px}
    }
  </style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="lb">
    <h1>Imperio de Romano</h1>
    <div class="sub">grand strategy multiplayer</div>

    <input type="text" id="nameInput" placeholder="Tu nombre..." maxlength="14" value="Romano">

    <div class="lbl">Escenario</div>
    <div class="row" id="scenarioRow"></div>
    <div id="scenarioDesc" style="font-size:10px;color:rgba(255,255,255,.3);margin-bottom:8px"></div>

    <div class="lbl">Dificultad bots</div>
    <div class="row" id="difficultyRow">
      <button class="opt" data-d="easy">Facil</button>
      <button class="opt sel" data-d="normal">Normal</button>
      <button class="opt" data-d="hard">Dificil</button>
    </div>

    <div class="lbl">Elegi tu pais (click en el mapa)</div>
    <canvas id="miniMap" width="480" height="240"></canvas>
    <div id="selCountry">
      <div id="selFlag">🌍</div>
      <div>
        <div id="selName">Sin pais</div>
        <div id="selStats"></div>
      </div>
    </div>

    <div class="lbl">Jugadores</div>
    <div id="lobbyPlayers"></div>

    <div style="display:flex;gap:8px;justify-content:center;margin-top:14px">
      <button class="btn btn-sec" id="joinBtn">UNIRSE</button>
      <button class="btn btn-pri" id="startBtn">EMPEZAR</button>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <div id="topBar">
    <button id="backHome" onclick="location.href='/'">&#8592;</button>
    <div id="turnLabel">Año 1/15</div>
    <div id="timeLabel">0:30</div>
    <div style="width:30px"></div>
  </div>
  <div id="mainArea">
    <div id="mapWrap"><canvas id="worldMap"></canvas></div>
    <div id="panel">
      <div id="panelFlag">🌍</div>
      <div id="panelName">Selecciona un pais</div>
      <div id="panelStats"></div>
      <div class="actions" id="panelActions"></div>
    </div>
    <div id="chat">
      <div id="chatMsgs"></div>
      <form id="chatForm" onsubmit="sendChat(event)">
        <input type="text" id="chatInput" placeholder="Mensaje..." maxlength="200" autocomplete="off">
        <button type="submit" id="chatSend">Enviar</button>
      </form>
    </div>
  </div>
</div>

<div id="overlay"><h2 id="olT"></h2><p id="olM"></p></div>

<script src="/socket.io/socket.io.js"></script>

// ── Mini map (lobby) ──
var miniCvs = document.getElementById('miniMap');
var mctx = miniCvs.getContext('2d');

function drawContinents(ctx, w, h) {
  // Land fill - lighter than ocean
  ctx.fillStyle = '#1e2d4a';
  ctx.strokeStyle = 'rgba(120,180,255,.3)';
  ctx.lineWidth = 1.2;
  CONTINENTS.forEach(function(poly) {
    ctx.beginPath();
    poly.forEach(function(pt, i) {
      var x = (pt[0]/1000)*w;
      var y = (pt[1]/500)*h;
      if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  });
  // Add subtle highlights on land
  ctx.fillStyle = 'rgba(255,255,255,.02)';
  CONTINENTS.forEach(function(poly) {
    ctx.beginPath();
    poly.forEach(function(pt, i) {
      var x = (pt[0]/1000)*w;
      var y = (pt[1]/500)*h - 1;
      if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.closePath();
    ctx.fill();
  });
}

function drawMiniMap() {
  var w = miniCvs.width, h = miniCvs.height;
  // Ocean
  mctx.fillStyle = '#0a1428';
  mctx.fillRect(0,0,w,h);
  // Continents
  drawContinents(mctx, w, h);
  // Countries
  COUNTRIES.forEach(function(c) {
    var x = (c.x / 1000) * w;
    var y = (c.y / 500) * h;
    var sel = c.id === selectedCountry;
    mctx.beginPath();
    mctx.arc(x, y, sel ? 5 : 3, 0, Math.PI*2);
    mctx.fillStyle = sel ? '#A78BFA' : 'rgba(255,255,255,.5)';
    mctx.fill();
    if (sel) {
      mctx.beginPath(); mctx.arc(x, y, 8, 0, Math.PI*2);
      mctx.strokeStyle = '#A78BFA'; mctx.lineWidth = 2; mctx.stroke();
    }
  });
}

function autoJoin() {
  if (joined) return;
  socket.emit('join', { name: document.getElementById('nameInput').value.trim() || 'Lider' });
  joined = true;
  document.getElementById('joinBtn').style.opacity = '0.5';
  document.getElementById('joinBtn').textContent = 'UNIDO';
}

miniCvs.addEventListener('click', function(e) {
  var r = miniCvs.getBoundingClientRect();
  var cx = (e.clientX - r.left) / r.width * miniCvs.width;
  var cy = (e.clientY - r.top) / r.height * miniCvs.height;
  // Find nearest country
  var best = null, bestD = Infinity;
  COUNTRIES.forEach(function(c) {
    var x = (c.x / 1000) * miniCvs.width;
    var y = (c.y / 500) * miniCvs.height;
    var dx = x - cx, dy = y - cy;
    var d = dx*dx + dy*dy;
    if (d < bestD) { bestD = d; best = c; }
  });
  if (best && bestD < 400) {
    autoJoin(); // auto-join if not joined
    selectedCountry = best.id;
    setTimeout(function(){ socket.emit('selectCountry', { country: best.id }); }, 100);
    updateSelDisplay();
    drawMiniMap();
  }
});

function updateSelDisplay() {
  var c = COUNTRIES.find(function(x) { return x.id === selectedCountry; });
  if (c) {
    document.getElementById('selFlag').textContent = c.flag;
    document.getElementById('selName').textContent = c.name;
    document.getElementById('selStats').textContent = c.id + ' · ' + c.region;
  } else {
    document.getElementById('selFlag').textContent = '🌍';
    document.getElementById('selName').textContent = 'Sin pais';
    document.getElementById('selStats').textContent = '';
  }
}

// ── Lobby UI ──
document.getElementById('joinBtn').onclick = function() {

  joined = true;
  this.style.opacity = '0.4';
  this.textContent = 'UNIDO';
};

document.getElementById('startBtn').onclick = function() {
  socket.emit('start');

document.querySelectorAll('#difficultyRow .opt').forEach(function(b) {
  b.onclick = function() {
    document.querySelectorAll('#difficultyRow .opt').forEach(function(x){x.classList.remove('sel');});
    b.classList.add('sel');
    selDifficulty = b.getAttribute('data-d');
    socket.emit('setDifficulty', { difficulty: selDifficulty });
  };
});

function buildScenarios() {
  var row = document.getElementById('scenarioRow');
  row.innerHTML = '';
  SCENARIOS_LIST.forEach(function(s) {
    var b = document.createElement('button');
    b.className = 'opt' + (s.id === selScenario ? ' sel' : '');
    b.textContent = s.name;
    b.onclick = function() {
      document.querySelectorAll('#scenarioRow .opt').forEach(function(x){x.classList.remove('sel');});
      b.classList.add('sel');
      selScenario = s.id;
      socket.emit('setScenario', { scenario: s.id });
      document.getElementById('scenarioDesc').textContent = s.desc;
    };
    row.appendChild(b);
  });
  var cur = SCENARIOS_LIST.find(function(s){return s.id===selScenario;});
  if (cur) document.getElementById('scenarioDesc').textContent = cur.desc;
}

socket.on('lobby', function(data) {
  COUNTRIES = data.countries;
  SCENARIOS_LIST = data.scenarios || [];
  if (SCENARIOS_LIST.length && document.getElementById('scenarioRow').children.length === 0) {
    buildScenarios();
  }
  // Players display
  var lp = document.getElementById('lobbyPlayers');
  lp.innerHTML = '';
  data.players.forEach(function(p) {
    var el = document.createElement('div');
    el.className = 'lpp';
    el.style.background = p.color;
    el.textContent = p.name + (p.country ? ' (' + p.country + ')' : '');
    lp.appendChild(el);
  });
  drawMiniMap();
});

socket.on('error', function(d) {
  alert(d.msg || 'Error');
});

socket.on('gameStart', function(d) {
  document.getElementById('lobby').classList.add('hidden');
  document.getElementById('game').classList.add('show');
  resizeMap();
});

socket.on('state', function(s) {
  gameState = s;
  document.getElementById('turnLabel').textContent = 'Año ' + s.turn + '/' + s.maxTurns;
  var m = Math.floor(s.timeLeft/60), sec = s.timeLeft % 60;
  document.getElementById('timeLabel').textContent = m + ':' + (sec<10?'0':'') + sec;
  // Find my country from players
  for (var sid in s.players) {
    if (s.players[sid].name === (document.getElementById('nameInput').value.trim() || 'Lider')) {
      myCountry = s.players[sid].country;
      break;
    }
  }
  drawWorldMap();
  if (inspectCountry) updatePanel(inspectCountry);
});

socket.on('chat', function(d) {
  var el = document.getElementById('chatMsgs');
  var div = document.createElement('div');
  div.className = 'cmsg';
  div.innerHTML = '<span class="n" style="color:'+d.color+'">'+esc(d.name)+':</span>'+esc(d.msg);
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
});

socket.on('log', function(d) {
  var el = document.getElementById('chatMsgs');
  var div = document.createElement('div');
  div.className = 'csys';
  div.textContent = '[T'+d.turn+'] ' + d.msg;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
});

socket.on('gameEnd', function(d) {
  var ol = document.getElementById('overlay');
  ol.classList.add('show');
  document.getElementById('olT').textContent = 'GANADOR: ' + (d.winner ? d.winner.country : '?');
  document.getElementById('olT').style.color = '#FBBF24';
  document.getElementById('olM').innerHTML = 'Top 5:<br>' + d.scores.slice(0,5).map(function(s,i){return (i+1)+'. '+s.country+' ('+s.score+' pts)';}).join('<br>');
});

// Tick UI for time countdown
setInterval(function() {
  if (gameState && gameState.timeLeft > 0) {
    gameState.timeLeft--;
    var m = Math.floor(gameState.timeLeft/60), sec = gameState.timeLeft % 60;
    document.getElementById('timeLabel').textContent = m + ':' + (sec<10?'0':'') + sec;
  }
}, 1000);

// ── World Map (game) ──
var wmCvs = document.getElementById('worldMap');
var wmCtx = wmCvs.getContext('2d');
var dpr = window.devicePixelRatio || 1;

function resizeMap() {
  var wrap = document.getElementById('mapWrap');
  wmCvs.width = wrap.clientWidth * dpr;
  wmCvs.height = wrap.clientHeight * dpr;
  wmCvs.style.width = wrap.clientWidth + 'px';
  wmCvs.style.height = wrap.clientHeight + 'px';
}
window.addEventListener('resize', resizeMap);

function drawWorldMap() {
  if (!gameState) return;
  var w = wmCvs.width / dpr, h = wmCvs.height / dpr;
  wmCtx.setTransform(dpr,0,0,dpr,0,0);
  wmCtx.fillStyle = '#0a1428';
  wmCtx.fillRect(0,0,w,h);

  // Continents
  drawContinents(wmCtx, w, h);

  // Countries
  COUNTRIES.forEach(function(c) {
    var x = (c.x / 1000) * w;
    var y = (c.y / 500) * h;
    var data = gameState.countries[c.id];
    if (!data) return;
    var size = 6 + Math.min(20, data.army / 30);
    var color = '#666';
    if (data.owner) {
      var p = gameState.players[data.owner];
      if (p) color = p.color;
    } else {
      // Bot - color by personality (simplified, all gray)
      color = '#555';
    }
    // Highlight if war
    var atWar = data.war && data.war.length > 0;
    // Body
    wmCtx.beginPath();
    wmCtx.arc(x, y, size, 0, Math.PI*2);
    wmCtx.fillStyle = color;
    wmCtx.globalAlpha = 0.85;
    wmCtx.fill();
    wmCtx.globalAlpha = 1;
    // Border
    wmCtx.strokeStyle = atWar ? '#EF4444' : 'rgba(255,255,255,.2)';
    wmCtx.lineWidth = atWar ? 2 : 1;
    wmCtx.stroke();
    // Selected
    if (c.id === inspectCountry) {
      wmCtx.beginPath();
      wmCtx.arc(x, y, size + 4, 0, Math.PI*2);
      wmCtx.strokeStyle = '#A78BFA';
      wmCtx.lineWidth = 2;
      wmCtx.stroke();
    }
    // Label (small)
    if (size > 10 || c.id === inspectCountry) {
      wmCtx.font = '700 9px Outfit';
      wmCtx.textAlign = 'center';
      wmCtx.fillStyle = 'rgba(255,255,255,.7)';
      wmCtx.fillText(c.id, x, y + size + 10);
    }
  });

  // Player flag indicator on my country
  if (myCountry) {
    var mc = COUNTRIES.find(function(x){return x.id===myCountry;});
    if (mc) {
      var mx = (mc.x / 1000) * w;
      var my = (mc.y / 500) * h;
      wmCtx.font = '14px serif';
      wmCtx.textAlign = 'center';
      wmCtx.fillText(mc.flag, mx, my - 12);
    }
  }
}

wmCvs.addEventListener('click', function(e) {
  if (!gameState) return;
  var r = wmCvs.getBoundingClientRect();
  var cx = (e.clientX - r.left);
  var cy = (e.clientY - r.top);
  var w = r.width, h = r.height;
  var best = null, bestD = Infinity;
  COUNTRIES.forEach(function(c) {
    var x = (c.x / 1000) * w;
    var y = (c.y / 500) * h;
    var dx = x - cx, dy = y - cy;
    var d = dx*dx + dy*dy;
    if (d < bestD) { bestD = d; best = c; }
  });
  if (best && bestD < 900) {
    inspectCountry = best.id;
    updatePanel(best.id);
    drawWorldMap();
  }
});

function updatePanel(cid) {
  var c = COUNTRIES.find(function(x){return x.id===cid;});
  if (!c || !gameState) return;
  var data = gameState.countries[cid];
  document.getElementById('panelFlag').textContent = c.flag;
  document.getElementById('panelName').textContent = c.name;
  var ownerName = '-';
  if (data.owner && gameState.players[data.owner]) ownerName = gameState.players[data.owner].name;
  else if (!data.owner) ownerName = 'IA (Bot)';

  var stats = document.getElementById('panelStats');
  stats.innerHTML =
    '<div class="stat"><span>Lider</span><span class="v">'+ownerName+'</span></div>'+
    '<div class="stat"><span>Ejercito</span><span class="v">'+data.army+'</span></div>'+
    '<div class="stat"><span>Economia</span><span class="v">'+data.eco+'</span></div>'+
    '<div class="stat"><span>Tech</span><span class="v">'+data.tech+'</span></div>'+
    '<div class="stat"><span>Territorios</span><span class="v">'+data.territories.length+'</span></div>'+
    '<div class="stat"><span>Aliados</span><span class="v">'+(data.allies.length?data.allies.join(', '):'-')+'</span></div>'+
    '<div class="stat"><span>Guerra con</span><span class="v" style="color:#F87171">'+(data.war.length?data.war.join(', '):'-')+'</span></div>';

  // Actions only if it's another country and I have a country
  var acts = document.getElementById('panelActions');
  acts.innerHTML = '';
  if (myCountry && cid !== myCountry) {
    var mineData = gameState.countries[myCountry];
    var atWar = mineData.war.indexOf(cid) !== -1;
    var allied = mineData.allies.indexOf(cid) !== -1;
    if (!atWar && !allied) {
      var b1 = document.createElement('button'); b1.className='actbtn'; b1.textContent='⚔️ Declarar guerra';
      b1.onclick=function(){socket.emit('action',{type:'declareWar',target:cid});};
      acts.appendChild(b1);
      var b2 = document.createElement('button'); b2.className='actbtn'; b2.textContent='🤝 Proponer alianza';
      b2.onclick=function(){socket.emit('action',{type:'alliance',target:cid});};
      acts.appendChild(b2);
    }
    if (atWar) {
      var b3 = document.createElement('button'); b3.className='actbtn'; b3.textContent='🛡️ Invadir';
      b3.onclick=function(){socket.emit('action',{type:'invade',target:cid});};
      acts.appendChild(b3);
    }
  } else if (cid === myCountry) {
    var b4 = document.createElement('button'); b4.className='actbtn'; b4.textContent='🏗️ Reclutar 50 tropas (-100 oro)';
    b4.onclick=function(){socket.emit('action',{type:'build',amount:50});};
    acts.appendChild(b4);
  }
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
window.sendChat = function(e) {
  e.preventDefault();
  var inp = document.getElementById('chatInput');
  var m = inp.value.trim();
  if (!m) return;
  socket.emit('chat', { msg: m });
  inp.value = '';
};

// Init
setTimeout(function(){ resizeMap(); drawMiniMap(); }, 100);

})();
</script>
</body>
</html>
