<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Imperio de Romano</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#f5f5f7;font-family:'Outfit',sans-serif;color:#1a1a1a;height:100vh;overflow:hidden;touch-action:manipulation;-webkit-user-select:none;user-select:none}

    /* Lobby */
    #lobby{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:linear-gradient(135deg,#f0f0f5,#e8e8ee);overflow-y:auto;padding:14px}
    #lobby.h{display:none}
    .lb{text-align:center;padding:24px 28px;border-radius:20px;background:#fff;border:1px solid rgba(0,0,0,.06);max-width:900px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.08)}
    .lb h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(24px,5vw,34px);font-weight:800;background:linear-gradient(135deg,#1a1a1a,#4a4a4a);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .lb .sub{color:rgba(0,0,0,.4);font-size:9px;letter-spacing:3px;text-transform:uppercase;margin-bottom:18px}
    #ni{display:block;width:240px;max-width:80vw;margin:0 auto 12px;padding:11px 16px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;border:1.5px solid rgba(0,0,0,.1);border-radius:12px;background:#fff;color:#1a1a1a;text-align:center;outline:none}
    #ni:focus{border-color:#1a1a1a}
    .btn{padding:11px 22px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;border:none;border-radius:10px;cursor:pointer}
    .btn-pri{background:#1a1a1a;color:#fff}
    .btn-sec{background:#fff;color:#1a1a1a;border:1px solid rgba(0,0,0,.15)}
    .row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}
    .opt{padding:8px 14px;border-radius:8px;border:1.5px solid rgba(0,0,0,.1);background:#fff;color:rgba(0,0,0,.6);cursor:pointer;font-size:11px;font-weight:600;-webkit-tap-highlight-color:transparent}
    .opt.sel{border-color:#1a1a1a;color:#fff;background:#1a1a1a}
    .lbl{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:rgba(0,0,0,.45);margin:14px 0 6px;font-weight:700}

    #featuredCountries{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:6px auto 12px;max-width:520px}
    @media(max-width:500px){#featuredCountries{grid-template-columns:repeat(2,1fr)}}
    .fcard{padding:14px 8px;border-radius:14px;border:2px solid rgba(0,0,0,.08);background:#fff;cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent;transition:all .15s}
    .fcard:hover{border-color:#1a1a1a;transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.1)}
    .fcard.sel{border-color:#1a1a1a;background:#1a1a1a;color:#fff}
    .fcard .ff{font-size:36px;display:block;line-height:1}
    .fcard .fn{font-size:11px;font-weight:700;margin-top:4px;display:block}
    #countrySearch{display:block;width:100%;max-width:340px;margin:8px auto 4px;padding:11px 16px;font-family:'Outfit',sans-serif;font-size:13px;border:1.5px solid rgba(0,0,0,.1);border-radius:10px;background:#fff;color:#1a1a1a;outline:none}
    #countrySearch:focus{border-color:#1a1a1a}
    #searchResults{max-width:340px;margin:0 auto 8px;display:flex;flex-direction:column;gap:3px;max-height:180px;overflow-y:auto}
    .sresult{padding:8px 14px;border-radius:8px;background:#f5f5f7;border:1px solid rgba(0,0,0,.06);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:8px;-webkit-tap-highlight-color:transparent}
    .sresult:hover{background:#e8e8ee}
    .sresult.sel{background:#1a1a1a;color:#fff}
    #selCountry{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px;background:#1a1a1a;border-radius:12px;margin:6px 0;min-height:46px}
    #selFlag{font-size:32px}
    #selName{font-weight:700;color:#fff;font-size:14px}
    #lobbyPlayers{display:flex;gap:5px;justify-content:center;margin:8px 0;flex-wrap:wrap}
    .lpp{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;color:#fff}

    /* Game UI */
    #game{display:none;position:fixed;inset:0;flex-direction:column;background:#fff}
    #game.s{display:flex}
    #topBar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#1a1a1a;color:#fff;border-bottom:1px solid rgba(0,0,0,.1);flex-shrink:0;gap:6px}
    #turnLabel{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;flex:1;text-align:center}
    #nextTurnBtn{padding:7px 16px;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;border:none;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;letter-spacing:.5px}
    #backHome{background:none;border:none;color:rgba(255,255,255,.6);font-size:16px;cursor:pointer;padding:4px}

    #mainArea{flex:1;position:relative;overflow:hidden}
    #mapWrap{position:absolute;inset:0;overflow:hidden;background:#dde6f0}
    canvas#worldMap{display:block;width:100%;height:100%;cursor:grab}
    canvas#worldMap.grabbing{cursor:grabbing}

    /* Zoom controls */
    #zoomCtrl{position:absolute;top:8px;left:8px;display:flex;flex-direction:column;gap:4px;z-index:11}
    .zbtn{width:32px;height:32px;background:#fff;border:1px solid rgba(0,0,0,.12);border-radius:8px;color:#1a1a1a;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.1)}

    /* Side panels */
    #panel{position:absolute;right:8px;top:8px;width:280px;max-height:calc(100% - 16px);background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:14px;padding:14px;overflow-y:auto;z-index:10;display:none;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.12)}
    #panel.show{display:flex}
    #panelHeader{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid rgba(0,0,0,.06)}
    #panelFlag{font-size:34px}
    #panelName{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:800;flex:1;color:#1a1a1a}
    #panelClose{background:none;border:none;color:rgba(0,0,0,.4);cursor:pointer;font-size:18px;padding:0 4px}
    .stat{display:flex;justify-content:space-between;font-size:11px;color:rgba(0,0,0,.55);padding:4px 0;border-bottom:1px solid rgba(0,0,0,.05)}
    .stat .v{font-weight:700;color:#1a1a1a}
    .tabs{display:flex;gap:4px;margin:10px 0 6px}
    .tab{flex:1;padding:7px 8px;background:#f0f0f5;border:1px solid rgba(0,0,0,.06);border-radius:8px;cursor:pointer;font-size:10px;font-weight:700;text-align:center;color:rgba(0,0,0,.5);text-transform:uppercase;letter-spacing:.5px}
    .tab.act{background:#1a1a1a;border-color:#1a1a1a;color:#fff}
    .tabContent{display:none;flex-direction:column;gap:6px;flex:1;min-height:0}
    .tabContent.act{display:flex}

    /* Country chat panel */
    #countryChat{display:flex;flex-direction:column;flex:1;min-height:160px;max-height:280px}
    #ccMsgs{flex:1;overflow-y:auto;background:#f5f5f7;border:1px solid rgba(0,0,0,.06);border-radius:8px;padding:8px;margin-bottom:6px;font-size:11px;line-height:1.5}
    .ccm{margin:3px 0}
    .ccm.user{color:#1a1a1a;text-align:right;background:rgba(0,0,0,.04);padding:4px 8px;border-radius:6px}
    .ccm.ai{color:rgba(0,0,0,.75);background:#fff;padding:4px 8px;border-radius:6px;border:1px solid rgba(0,0,0,.04)}
    #ccForm{display:flex;gap:4px}
    #ccInput{flex:1;padding:8px 12px;font-size:11px;border:1px solid rgba(0,0,0,.1);border-radius:7px;background:#fff;color:#1a1a1a;outline:none;font-family:'Outfit',sans-serif}
    #ccSend{padding:8px 14px;font-size:10px;font-weight:700;border:none;border-radius:7px;background:#1a1a1a;color:#fff;cursor:pointer;font-family:'Space Grotesk',sans-serif}

    /* Bottom log */
    #log{position:absolute;left:8px;bottom:8px;width:280px;max-width:calc(100% - 16px);height:110px;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:12px;padding:8px 12px;overflow-y:auto;font-size:10px;line-height:1.5;z-index:9;box-shadow:0 4px 16px rgba(0,0,0,.08)}

    /* Overlay */
    #overlay{display:none;position:fixed;inset:0;z-index:90;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);align-items:center;justify-content:center;text-align:center;flex-direction:column;padding:20px}
    #overlay.s{display:flex}
    #overlay h2{font-family:'Space Grotesk',sans-serif;font-size:clamp(22px,5vw,30px);font-weight:800;margin-bottom:6px;color:#1a1a1a}
    #overlay p{color:rgba(0,0,0,.5);font-size:13px}

    /* Compact popup for other countries */
    #compactPopup{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:14px;padding:16px 20px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.2);min-width:200px;max-width:240px}
    #compactPopup.show{display:block}
    #cpClose{position:absolute;top:6px;right:6px;background:none;border:none;color:rgba(0,0,0,.4);font-size:14px;cursor:pointer;padding:4px}
    #cpFlag{font-size:42px;line-height:1;margin-bottom:6px}
    #cpName{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:800;color:#1a1a1a;margin-bottom:4px}
    #cpInfo{font-size:10px;color:rgba(0,0,0,.5);margin-bottom:10px;line-height:1.4}
    #cpHablar{padding:9px 18px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.5px}

    /* Floating Actions button */
    #floatActions{position:absolute;bottom:14px;right:14px;background:#1a1a1a;color:#fff;border:none;border-radius:14px;padding:14px 22px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.25);z-index:15;letter-spacing:.5px}
    #floatActions:hover{background:#000}

    /* Actions modal */
    #actionsModal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:14px}
    #actionsModal.show{display:flex}
    #actionsBox{background:#fff;border-radius:18px;padding:18px;max-width:520px;width:100%;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.3)}
    #actionsHeader{display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;border-bottom:1px solid rgba(0,0,0,.06);margin-bottom:10px}
    #amClose{background:none;border:none;font-size:20px;color:rgba(0,0,0,.4);cursor:pointer;padding:0 4px}
    #amMsgs{flex:1;overflow-y:auto;background:#f5f5f7;border-radius:10px;padding:10px;font-size:12px;line-height:1.5;min-height:200px;max-height:340px;margin-bottom:8px}
    .amm{margin:4px 0;padding:6px 10px;border-radius:6px}
    .amm.user{background:#1a1a1a;color:#fff;text-align:right}
    .amm.ok{background:#e8f5e9;color:#1b5e20}
    .amm.err{background:#ffebee;color:#b71c1c}
    #amForm{display:flex;gap:6px;margin-bottom:6px}
    #amForm input{flex:1;padding:11px 14px;border:1.5px solid rgba(0,0,0,.12);border-radius:10px;font-family:'Outfit',sans-serif;font-size:13px;color:#1a1a1a;outline:none}
    #amForm input:focus{border-color:#1a1a1a}
    #amForm button{padding:11px 18px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.5px}
    #amHints{font-size:9px;color:rgba(0,0,0,.4);text-align:center;line-height:1.5}

    @media(max-width:700px){
      #panel{width:calc(100% - 16px);right:8px;left:8px;top:54px;max-height:50vh}
      #log{display:none}
      #panelFlag{font-size:28px}
      #panelName{font-size:13px}
      .stat{font-size:10px}
      #countryChat{max-height:160px}
      #floatActions{padding:12px 18px;font-size:12px;bottom:10px;right:10px}
      #actionsBox{padding:14px;border-radius:14px}
    }
  </style>
</head>

<script src="/socket.io/socket.io.js"></script>
<script>
(function(){
'use strict';
var socket = io('/world', {transports:['websocket']});
var COUNTRIES = [];
var SCENARIOS_LIST = [];
var ALIASES = {};
var selScenario = '1936';
var selDifficulty = 'normal';
var selectedCountry = null;
var myCountry = null;
var joined = false;
var gameState = null;
var inspectCountry = null;

// ── Real GeoJSON world map ──
var WORLD_GEO = null;
var WORLD_LOADED = false;
var COUNTRY_CENTROIDS = {};

// Country palette - unique color per country (deterministic from ID)
var COLOR_PALETTE = [
  '#FFB3BA','#FFDFBA','#FFFFBA','#BAFFC9','#BAE1FF',
  '#D7BAFF','#FFBAE1','#BAFFE1','#FFE4BA','#C9BAFF',
  '#FFCCBC','#F8BBD0','#E1BEE7','#C5CAE9','#BBDEFB',
  '#B2EBF2','#B2DFDB','#C8E6C9','#DCEDC8','#FFF9C4',
  '#FFECB3','#FFE0B2','#D7CCC8','#CFD8DC','#FFCDD2',
  '#F0F4C3','#FFAB91','#FFCC80','#FFE082','#A5D6A7'
];
function colorForCountry(iso) {
  if (!iso) return '#e0e0e0';
  var hash = 0;
  for (var i = 0; i < iso.length; i++) hash = (hash * 31 + iso.charCodeAt(i)) | 0;
  return COLOR_PALETTE[Math.abs(hash) % COLOR_PALETTE.length];
}

function project(lon, lat) {
  return [(lon + 180) / 360 * 1000, (90 - lat) / 180 * 500];
}

// Polygon area for centroid calc
function polygonArea(ring) {
  var area = 0;
  for (var i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    area += (ring[j][0] + ring[i][0]) * (ring[j][1] - ring[i][1]);
  }
  return Math.abs(area / 2);
}

function loadWorldGeo() {
  fetch('https://cdn.jsdelivr.net/gh/nvkelso/natural-earth-vector@master/geojson/ne_110m_admin_0_countries.geojson')
    .then(function(r){return r.json();})
    .then(function(data) {
      WORLD_GEO = {};
      data.features.forEach(function(f) {
        var iso = f.properties.ISO_A3 || f.properties.ADM0_A3;
        if (!iso || iso === '-99') return;
        var polys = [];
        var geom = f.geometry;
        if (!geom) return;
        if (geom.type === 'Polygon') {
          polys.push(geom.coordinates[0].map(function(pt){return project(pt[0], pt[1]);}));
        } else if (geom.type === 'MultiPolygon') {
          geom.coordinates.forEach(function(poly) {
            polys.push(poly[0].map(function(pt){return project(pt[0], pt[1]);}));
          });
        }
        WORLD_GEO[iso] = polys;
        // Use the polygon with largest AREA (true mainland, not most points)
        var biggest = polys[0], biggestArea = polygonArea(polys[0]);
        polys.forEach(function(p){
          var a = polygonArea(p);
          if (a > biggestArea) { biggest = p; biggestArea = a; }
        });
        if (biggest && biggest.length) {
          var sx = 0, sy = 0;
          biggest.forEach(function(p){ sx += p[0]; sy += p[1]; });
          COUNTRY_CENTROIDS[iso] = [sx / biggest.length, sy / biggest.length];
        }
      });
      WORLD_LOADED = true;
      // Update country positions
      COUNTRIES.forEach(function(c) {
        var ctr = COUNTRY_CENTROIDS[c.id];
        if (ctr) { c.x = ctr[0]; c.y = ctr[1]; }
      });
      drawMiniMap();
      if (gameState) drawWorldMap();
    });
}
loadWorldGeo();

function drawMap(ctx, w, h, ownedColors, transform) {
  ctx.fillStyle = '#dde6f0'; // ocean
  ctx.fillRect(0,0,w,h);
  if (!WORLD_LOADED) {
    ctx.fillStyle = 'rgba(0,0,0,.3)';
    ctx.font = '12px Outfit';
    ctx.textAlign = 'center';
    ctx.fillText('Cargando mapa...', w/2, h/2);
    return;
  }
  ctx.save();
  if (transform) {
    ctx.translate(transform.x, transform.y);
    ctx.scale(transform.scale, transform.scale);
  }
  ctx.lineWidth = 0.5;
  ctx.strokeStyle = 'rgba(0,0,0,.3)';
  for (var iso in WORLD_GEO) {
    var polys = WORLD_GEO[iso];
    var fill = (ownedColors && ownedColors[iso]) ? ownedColors[iso] : colorForCountry(iso);
    ctx.fillStyle = fill;
    polys.forEach(function(ring) {
      ctx.beginPath();
      ring.forEach(function(pt, i) {
        var x = (pt[0]/1000)*w;
        var y = (pt[1]/500)*h;
        if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      });
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    });
  }

// Find country at canvas pos using point-in-polygon, with centroid fallback
function findCountryAt(cx, cy, w, h) {
  if (!WORLD_LOADED) return null;
  // First pass: exact polygon hit
  for (var iso in WORLD_GEO) {
    var polys = WORLD_GEO[iso];
    for (var i = 0; i < polys.length; i++) {
      var ring = polys[i];
      var inside = false;
      for (var j = 0, k = ring.length - 1; j < ring.length; k = j++) {
        var xi = (ring[j][0]/1000)*w, yi = (ring[j][1]/500)*h;
        var xj = (ring[k][0]/1000)*w, yj = (ring[k][1]/500)*h;
        if (((yi > cy) !== (yj > cy)) && (cx < (xj - xi) * (cy - yi) / (yj - yi) + xi)) inside = !inside;
      }
      if (inside) return iso;
    }
  }
  // Second pass: nearest centroid (fallback for islands like Japan)
  var best = null, bestD = Infinity;
  for (var iso2 in COUNTRY_CENTROIDS) {
    if (!COUNTRIES.find(function(c){return c.id===iso2;})) continue;
    var ctr = COUNTRY_CENTROIDS[iso2];
    var x = (ctr[0]/1000)*w;
    var y = (ctr[1]/500)*h;
    var dx = x - cx, dy = y - cy;
    var d = dx*dx + dy*dy;
    if (d < bestD) { bestD = d; best = iso2; }
  }
  // Only return if reasonably close (within 30px)
  if (bestD < 900) return best;
  return null;
}

// ── World Map (game) ──
var wmCvs = document.getElementById('worldMap');
var wmCtx = wmCvs.getContext('2d');
var dpr = window.devicePixelRatio || 1;
var mapTransform = { x: 0, y: 0, scale: 1 };

function resizeMap() {
  var wrap = document.getElementById('mapWrap');
  var ww = wrap.clientWidth, wh = wrap.clientHeight;
  // Maintain 2:1 aspect ratio for the world map
  // Fit map into wrap, centered
  var mapW = ww, mapH = ww / 2;
  if (mapH > wh) { mapH = wh; mapW = wh * 2; }
  wmCvs.width = ww * dpr;
  wmCvs.height = wh * dpr;
  wmCvs.style.width = ww + 'px';
  wmCvs.style.height = wh + 'px';
  // Store map dims for drawing
  mapDrawW = mapW;
  mapDrawH = mapH;
  mapOffX = (ww - mapW) / 2;
  mapOffY = (wh - mapH) / 2;
  drawWorldMap();
}
var mapDrawW = 0, mapDrawH = 0, mapOffX = 0, mapOffY = 0;
window.addEventListener('resize', resizeMap);

function drawWorldMap() {
  if (!gameState) return;
  var w = wmCvs.width / dpr, h = wmCvs.height / dpr;
  wmCtx.setTransform(dpr,0,0,dpr,0,0);
  wmCtx.fillStyle = '#dde6f0';
  wmCtx.fillRect(0,0,w,h);

  var ownedColors = {};
  for (var cid in gameState.countries) {
    var data = gameState.countries[cid];
    if (data.owner && gameState.players[data.owner]) {
      ownedColors[cid] = gameState.players[data.owner].color;
    } else if (data.controlledBy) {
      ownedColors[cid] = '#7a8aa8';
    }
  }
  if (inspectCountry) ownedColors[inspectCountry] = '#1a1a1a';

  // Apply pan/zoom transform on top of the map area
  wmCtx.save();
  wmCtx.translate(mapTransform.x + mapOffX, mapTransform.y + mapOffY);
  wmCtx.scale(mapTransform.scale, mapTransform.scale);

  // Draw countries within mapDrawW x mapDrawH area
  if (WORLD_LOADED) {
    wmCtx.lineWidth = 0.5 / mapTransform.scale;
    wmCtx.strokeStyle = 'rgba(0,0,0,.3)';
    for (var iso in WORLD_GEO) {
      var polys = WORLD_GEO[iso];
      var fill = ownedColors[iso] || colorForCountry(iso);
      wmCtx.fillStyle = fill;
      polys.forEach(function(ring) {
        wmCtx.beginPath();
        ring.forEach(function(pt, i) {
          var x = (pt[0]/1000)*mapDrawW;
          var y = (pt[1]/500)*mapDrawH;
          if (i===0) wmCtx.moveTo(x,y); else wmCtx.lineTo(x,y);
        });
        wmCtx.closePath();
        wmCtx.fill();
        wmCtx.stroke();
      });
    }
    // Country labels with army count
    COUNTRIES.forEach(function(c) {
      var data = gameState.countries[c.id];
      if (!data) return;
      var ctr = COUNTRY_CENTROIDS[c.id];
      if (!ctr) return;
      var x = (ctr[0]/1000)*mapDrawW;
      var y = (ctr[1]/500)*mapDrawH;
      var label = c.id;
      var showLabel = (data.army > 100 || c.id === inspectCountry || c.id === myCountry);
      if (showLabel) {
        wmCtx.font = '700 ' + (10/mapTransform.scale) + 'px Outfit';
        wmCtx.textAlign = 'center';
        wmCtx.lineWidth = 3/mapTransform.scale;
        wmCtx.strokeStyle = 'rgba(255,255,255,.9)';
        wmCtx.fillStyle = 'rgba(0,0,0,.85)';
        wmCtx.strokeText(label, x, y);
        wmCtx.fillText(label, x, y);
      }
    });
  }
  wmCtx.restore();
}

// ── Zoom and Pan ──
function getCanvasCoords(e) {
  var r = wmCvs.getBoundingClientRect();
  var px = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
  var py = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
  return [px, py];
}

function zoomAt(cx, cy, factor) {
  var newScale = mapTransform.scale * factor;
  newScale = Math.max(1, Math.min(8, newScale));
  if (newScale === mapTransform.scale) return;
  // Adjust translation so cx,cy stays in place
  mapTransform.x = cx - (cx - mapTransform.x) * (newScale / mapTransform.scale);
  mapTransform.y = cy - (cy - mapTransform.y) * (newScale / mapTransform.scale);
  mapTransform.scale = newScale;
  clampPan();
  drawWorldMap();
}

function clampPan() {
  var w = wmCvs.width / dpr, h = wmCvs.height / dpr;
  var maxX = 0, maxY = 0;
  var minX = w - w * mapTransform.scale;
  var minY = h - h * mapTransform.scale;
  if (mapTransform.x > maxX) mapTransform.x = maxX;
  if (mapTransform.x < minX) mapTransform.x = minX;
  if (mapTransform.y > maxY) mapTransform.y = maxY;
  if (mapTransform.y < minY) mapTransform.y = minY;
}

document.getElementById('zoomIn').onclick = function(){
  var w = wmCvs.width/dpr, h = wmCvs.height/dpr;
  zoomAt(w/2, h/2, 1.4);
};
document.getElementById('zoomOut').onclick = function(){
  var w = wmCvs.width/dpr, h = wmCvs.height/dpr;
  zoomAt(w/2, h/2, 0.7);
};
document.getElementById('zoomReset').onclick = function(){
  mapTransform = { x:0, y:0, scale:1 };
  drawWorldMap();
};

wmCvs.addEventListener('wheel', function(e){
  e.preventDefault();
  var c = getCanvasCoords(e);
  zoomAt(c[0], c[1], e.deltaY < 0 ? 1.15 : 0.87);
}, {passive:false});

// Drag to pan
var dragging = false, dragStart = null, dragMoved = false;
wmCvs.addEventListener('mousedown', function(e){
  dragging = true; dragStart = [e.clientX, e.clientY, mapTransform.x, mapTransform.y];
  dragMoved = false;
  wmCvs.classList.add('grabbing');
});
wmCvs.addEventListener('mousemove', function(e){
  if (!dragging) return;
  var dx = e.clientX - dragStart[0], dy = e.clientY - dragStart[1];
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true;
  mapTransform.x = dragStart[2] + dx;
  mapTransform.y = dragStart[3] + dy;
  clampPan();
  drawWorldMap();
});
window.addEventListener('mouseup', function(){
  dragging = false;
  wmCvs.classList.remove('grabbing');
});

// Touch pan + pinch
var touchState = null;
wmCvs.addEventListener('touchstart', function(e){
  if (e.touches.length === 1) {
    touchState = { mode:'pan', x:e.touches[0].clientX, y:e.touches[0].clientY, tx:mapTransform.x, ty:mapTransform.y, moved:false };
  } else if (e.touches.length === 2) {
    var dx = e.touches[0].clientX - e.touches[1].clientX;
    var dy = e.touches[0].clientY - e.touches[1].clientY;
    touchState = { mode:'pinch', dist:Math.sqrt(dx*dx+dy*dy), scale:mapTransform.scale };
  }
}, {passive:false});
wmCvs.addEventListener('touchmove', function(e){
  e.preventDefault();
  if (!touchState) return;
  if (touchState.mode === 'pan' && e.touches.length === 1) {
    var dx = e.touches[0].clientX - touchState.x;
    var dy = e.touches[0].clientY - touchState.y;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) touchState.moved = true;
    mapTransform.x = touchState.tx + dx;
    mapTransform.y = touchState.ty + dy;
    clampPan();
    drawWorldMap();
  } else if (touchState.mode === 'pinch' && e.touches.length === 2) {
    var dx2 = e.touches[0].clientX - e.touches[1].clientX;
    var dy2 = e.touches[0].clientY - e.touches[1].clientY;
    var d = Math.sqrt(dx2*dx2+dy2*dy2);
    var factor = d / touchState.dist;
    var w = wmCvs.width/dpr, h = wmCvs.height/dpr;
    var ns = Math.max(1, Math.min(8, touchState.scale * factor));
    mapTransform.scale = ns;
    clampPan();
    drawWorldMap();
  }
}, {passive:false});
wmCvs.addEventListener('touchend', function(e){
  if (touchState && touchState.mode === 'pan' && !touchState.moved) {
    // Treat as click
    handleMapClick(touchState.x, touchState.y);
  }
  touchState = null;
});

function handleMapClick(clientX, clientY) {
  if (!gameState || !WORLD_LOADED) return;
  var r = wmCvs.getBoundingClientRect();
  var cx = clientX - r.left;
  var cy = clientY - r.top;
  // Reverse: subtract pan offset, divide by scale, subtract map offset
  var mx = (cx - mapTransform.x - mapOffX) / mapTransform.scale;
  var my = (cy - mapTransform.y - mapOffY) / mapTransform.scale;
  var iso = findCountryAt(mx, my, mapDrawW, mapDrawH);
  if (iso && gameState.countries[iso]) {
    inspectCountry = iso;
    if (iso === myCountry) {
      document.getElementById('panel').classList.add('show');
      document.getElementById('compactPopup').classList.remove('show');
      updatePanel(iso);
    } else {
      // Compact popup for other countries
      document.getElementById('panel').classList.remove('show');
      showCompactPopup(iso);
    }
    drawWorldMap();
  }
}

wmCvs.addEventListener('click', function(e) {
  if (dragMoved) return; // ignore click after drag
  handleMapClick(e.clientX, e.clientY);
});

  document.getElementById('amName').textContent = (alias && alias.name) || c.name;
  document.getElementById('amStats').textContent =
    '💰 '+data.eco+' | ⚔️ '+data.army+' | ⚓ '+(data.navy||0)+' | 🏭 '+(data.industry||0)+' | 🛡️ '+(data.defense||0)+' | 🔬 '+data.tech;
  document.getElementById('actionsModal').classList.add('show');
  setTimeout(function(){
    var inp = document.getElementById('cmdInput');
    if (inp) inp.focus();
  }, 100);
};
window.closeMyActions = function() {
  document.getElementById('actionsModal').classList.remove('show');
};

window.sendCountryChat = function(e) {
  e.preventDefault();
  if (!inspectCountry) return;
  var inp = document.getElementById('ccInput');
  var msg = inp.value.trim();
  if (!msg) return;
  // Append user msg locally
  var el = document.getElementById('ccMsgs');
  var div = document.createElement('div');
  div.className = 'ccm user';
  div.innerHTML = '<b>Vos:</b> '+esc(msg);
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
  socket.emit('countryChat', { country: inspectCountry, msg: msg });
  inp.value = '';
};

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

setTimeout(function(){ resizeMap(); drawMiniMap(); }, 100);

})();
</script>
