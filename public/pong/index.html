<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Las Bolas de Romano</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a1a;overflow:hidden;font-family:'Space Grotesk',sans-serif;color:#fff;
      touch-action:none;-webkit-user-select:none;user-select:none;
      display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column}
    #menu{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:rgba(10,10,26,.95);backdrop-filter:blur(12px)}
    #menu.hidden{display:none}
    .menu-box{text-align:center;padding:30px 36px;border-radius:24px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);max-width:90vw}
    .menu-box h1{font-size:clamp(24px,6vw,42px);font-weight:800;margin-bottom:6px;background:linear-gradient(135deg,#EF4444,#3B82F6,#22C55E,#F59E0B);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .menu-box .sub{color:rgba(255,255,255,.3);font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}
    #nameInput{display:block;width:220px;max-width:80vw;margin:0 auto 14px;padding:11px 16px;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;border:2px solid rgba(255,255,255,.1);border-radius:14px;background:rgba(255,255,255,.05);color:#fff;text-align:center;outline:none}
    #nameInput:focus{border-color:rgba(59,130,246,.5)}
    .play-btn{display:block;width:220px;max-width:80vw;margin:0 auto;padding:12px;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;border:none;border-radius:14px;background:linear-gradient(135deg,#3B82F6,#22C55E);color:#0a0a1a;cursor:pointer}
    .play-btn:active{transform:scale(.97)}
    .hint{margin-top:14px;color:rgba(255,255,255,.2);font-size:10px;line-height:1.8}
    #overlay{display:none;position:fixed;inset:0;z-index:90;background:rgba(10,10,26,.85);backdrop-filter:blur(8px);align-items:center;justify-content:center;text-align:center;flex-direction:column}
    #overlay.show{display:flex}
    #overlay h2{font-size:32px;font-weight:800;margin-bottom:8px}
    #overlay p{color:rgba(255,255,255,.5);font-size:14px}
    #timer{position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:50;pointer-events:none;font-size:13px;color:rgba(255,255,255,.5)}
    #pwMsg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:80;pointer-events:none;font-size:16px;font-weight:700;opacity:0;transition:opacity .3s}
    #pwMsg.show{opacity:1}
    canvas{border-radius:6px}
    #backBtn{position:fixed;top:10px;left:10px;z-index:60;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);font-size:12px;padding:6px 12px;border-radius:8px;cursor:pointer;font-family:'Space Grotesk',sans-serif;text-decoration:none}
  </style>
</head>
<body>
<div id="menu">
  <div class="menu-box">
    <h1>Las Bolas de Romano</h1>
    <div class="sub">4 jugadores &middot; power-ups</div>
    <input type="text" id="nameInput" placeholder="Tu nombre..." maxlength="12" autofocus value="Romano">
    <button class="play-btn" id="playBtn">JUGAR</button>
    <div class="hint" id="hintText">
      A/D o flechas = mover paleta<br>
      Primero a 5 goles en contra pierde<br>
      Bots llenan los espacios vacios
    </div>
  </div>
</div>
<div id="overlay"><h2 id="olTitle"></h2><p id="olMsg"></p></div>
<span id="timer"></span>
<div id="pwMsg"></div>
<a id="backBtn" href="/">&#8592; Menu</a>
<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
(function(){
'use strict';
var canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
var isTouch=('ontouchstart' in window)||(navigator.maxTouchPoints>0);
var socket=io('/pong',{transports:['websocket']});
var joined=false,state=null;
var ARENA=800;

function resize(){
  var pad=isTouch?10:40;
  var s=Math.min(innerWidth-pad*2,innerHeight-pad*2,ARENA);
  canvas.width=s;canvas.height=s;
  canvas.style.marginTop=(isTouch?'30px':'0');
}
resize();addEventListener('resize',resize);
function S(){return canvas.width/ARENA;}

// Menu
var menu=document.getElementById('menu');
if(isTouch) document.getElementById('hintText').innerHTML='Desliza izquierda/derecha en la pantalla<br>Primero a 5 goles en contra pierde<br>Bots llenan los espacios vacios';

document.getElementById('playBtn').onclick=function(){
  socket.emit('join',{name:document.getElementById('nameInput').value.trim()||'Jugador'});
  menu.classList.add('hidden');joined=true;
};
document.getElementById('nameInput').onkeydown=function(e){if(e.key==='Enter')document.getElementById('playBtn').click();};

// ── Input ──
var inputDir=0;
addEventListener('keydown',function(e){
  if(e.key==='a'||e.key==='A'||e.key==='ArrowLeft')inputDir=-1;
  if(e.key==='d'||e.key==='D'||e.key==='ArrowRight')inputDir=1;
});
addEventListener('keyup',function(e){
  if(e.key==='a'||e.key==='A'||e.key==='ArrowLeft'){if(inputDir===-1)inputDir=0;}
  if(e.key==='d'||e.key==='D'||e.key==='ArrowRight'){if(inputDir===1)inputDir=0;}
});

// Touch: drag anywhere on screen
var touchStartX=0,touchId=null;
canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  var t=e.changedTouches[0];touchId=t.identifier;touchStartX=t.clientX;
},{passive:false});
canvas.addEventListener('touchmove',function(e){
  e.preventDefault();
  for(var i=0;i<e.changedTouches.length;i++){
    if(e.changedTouches[i].identifier===touchId){
      var dx=e.changedTouches[i].clientX-touchStartX;
      if(dx<-8)inputDir=-1;
      else if(dx>8)inputDir=1;
      else inputDir=0;
      touchStartX=e.changedTouches[i].clientX;
      break;
    }
  }
},{passive:false});
canvas.addEventListener('touchend',function(e){
  for(var i=0;i<e.changedTouches.length;i++){if(e.changedTouches[i].identifier===touchId){inputDir=0;touchId=null;break;}}
});
canvas.addEventListener('touchcancel',function(){inputDir=0;touchId=null;});

setInterval(function(){
  if(!joined)return;
  socket.emit('input',{dir:inputDir});
},33);

// Network
socket.on('phase',function(d){
  var ol=document.getElementById('overlay'),t=document.getElementById('olTitle'),m=document.getElementById('olMsg');
  if(d.phase==='waiting'){ol.classList.remove('show');}
  else if(d.phase==='playing'){ol.classList.add('show');t.textContent='GO!';t.style.color='#22C55E';m.textContent='';setTimeout(function(){ol.classList.remove('show');},1500);}
  else if(d.phase==='ended'){ol.classList.add('show');t.textContent='GANO: '+d.winner;t.style.color=d.color||'#F59E0B';m.textContent='Nueva ronda en 5s...';}
});
socket.on('pwmsg',function(d){var el=document.getElementById('pwMsg');el.textContent=d.msg;el.style.color='#A78BFA';el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2000);});
socket.on('s',function(s){state=s;ARENA=s.arena||800;});

// Smooth
var dispBall={x:400,y:400},dispBalls=[],dispPads={},SM=0.3;

function render(){
  requestAnimationFrame(render);
  var sc=S();
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,canvas.width,canvas.height);

  if(!state||!joined){
    ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=2;
    ctx.strokeRect(4,4,canvas.width-8,canvas.height-8);
    return;
  }

  // Timer
  var timerEl=document.getElementById('timer');
  timerEl.textContent=state.phase==='waiting'?'Esperando ('+state.pc+'/4) - '+state.tl+'s':'';

  // Arena
  ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=2*sc;
  ctx.strokeRect(2*sc,2*sc,ARENA*sc-4*sc,ARENA*sc-4*sc);
  ctx.setLineDash([6*sc,6*sc]);ctx.strokeStyle='rgba(255,255,255,.03)';ctx.lineWidth=sc;
  ctx.beginPath();ctx.moveTo(ARENA*sc/2,0);ctx.lineTo(ARENA*sc/2,ARENA*sc);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,ARENA*sc/2);ctx.lineTo(ARENA*sc,ARENA*sc/2);ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();ctx.arc(ARENA*sc/2,ARENA*sc/2,50*sc,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,.03)';ctx.stroke();

  // Walls colored by side owner
  var sides={top:{x1:0,y1:0,x2:ARENA,y2:0},bottom:{x1:0,y1:ARENA,x2:ARENA,y2:ARENA},left:{x1:0,y1:0,x2:0,y2:ARENA},right:{x1:ARENA,y1:0,x2:ARENA,y2:ARENA}};
  for(var sn in sides){
    var si=sides[sn],pad=state.pads[sn];
    if(pad&&pad.alive){
      ctx.strokeStyle=pad.color;ctx.globalAlpha=0.3;ctx.lineWidth=3*sc;
      ctx.beginPath();ctx.moveTo(si.x1*sc,si.y1*sc);ctx.lineTo(si.x2*sc,si.y2*sc);ctx.stroke();
      ctx.globalAlpha=1;
    }
  }

  // Pads
  for(var side in state.pads){
    var pad=state.pads[side];
    if(!pad.alive)continue;
    if(!dispPads[side])dispPads[side]=pad.pos;
    dispPads[side]+=(pad.pos-dispPads[side])*SM;
    var pos=dispPads[side],half=pad.len/2,r;
    var pt=12;
    if(side==='top')r={x:(pos-half)*sc,y:0,w:pad.len*sc,h:pt*sc};
    else if(side==='bottom')r={x:(pos-half)*sc,y:(ARENA-pt)*sc,w:pad.len*sc,h:pt*sc};
    else if(side==='left')r={x:0,y:(pos-half)*sc,w:pt*sc,h:pad.len*sc};
    else r={x:(ARENA-pt)*sc,y:(pos-half)*sc,w:pt*sc,h:pad.len*sc};

    ctx.fillStyle=pad.color;ctx.globalAlpha=0.9;
    if(ctx.roundRect){ctx.beginPath();ctx.roundRect(r.x,r.y,r.w,r.h,4*sc);ctx.fill();}
    else{ctx.fillRect(r.x,r.y,r.w,r.h);}
    ctx.globalAlpha=1;

    // Name
    ctx.font='600 '+(9*sc)+'px Space Grotesk';ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.35)';
    if(side==='top')ctx.fillText(pad.name,pos*sc,20*sc);
    else if(side==='bottom')ctx.fillText(pad.name,pos*sc,(ARENA-18)*sc);
    else if(side==='left'){ctx.save();ctx.translate(18*sc,pos*sc);ctx.rotate(-Math.PI/2);ctx.fillText(pad.name,0,0);ctx.restore();}
    else{ctx.save();ctx.translate((ARENA-18)*sc,pos*sc);ctx.rotate(Math.PI/2);ctx.fillText(pad.name,0,0);ctx.restore();}
  }

  // Scores
  var scores=state.scores||{};
  if(scores.top)drawScore(scores.top,ARENA*sc/2,38*sc,sc);
  if(scores.bottom)drawScore(scores.bottom,ARENA*sc/2,(ARENA-34)*sc,sc);
  if(scores.left)drawScore(scores.left,38*sc,ARENA*sc/2,sc);
  if(scores.right)drawScore(scores.right,(ARENA-38)*sc,ARENA*sc/2,sc);

  // Ball
  if(state.ball){
    dispBall.x+=(state.ball.x-dispBall.x)*SM;dispBall.y+=(state.ball.y-dispBall.y)*SM;
    drawBall(dispBall,state.ball.r||10,sc,'#fff');
  }
  // Extra balls
  if(state.balls){
    while(dispBalls.length<state.balls.length)dispBalls.push({x:400,y:400});
    while(dispBalls.length>state.balls.length)dispBalls.pop();
    for(var bi=0;bi<state.balls.length;bi++){
      dispBalls[bi].x+=(state.balls[bi].x-dispBalls[bi].x)*SM;
      dispBalls[bi].y+=(state.balls[bi].y-dispBalls[bi].y)*SM;
      drawBall(dispBalls[bi],state.balls[bi].r||10,sc,'#EC4899');
    }
  }
  // Powerups
  if(state.pw){
    var now=Date.now();
    for(var pi=0;pi<state.pw.length;pi++){
      var pw=state.pw[pi],px=pw.x*sc,py=pw.y*sc;
      var pulse=1+Math.sin(now*0.005)*0.12,pr=pw.r*sc*pulse;
      ctx.beginPath();ctx.arc(px,py,pr+3*sc,0,Math.PI*2);ctx.fillStyle=pw.color;ctx.globalAlpha=0.1;ctx.fill();
      ctx.beginPath();ctx.arc(px,py,pr,0,Math.PI*2);ctx.fillStyle=pw.color;ctx.globalAlpha=0.8;ctx.fill();
      ctx.globalAlpha=1;ctx.font=(11*sc)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(pw.icon,px,py);ctx.textBaseline='alphabetic';
    }
  }

  // Mobile hint
  if(isTouch&&state.phase==='playing'){
    ctx.font=(8*sc)+'px Space Grotesk';ctx.textAlign='center';
    ctx.fillStyle='rgba(255,255,255,.12)';
    ctx.fillText('desliza para mover',ARENA*sc/2,(ARENA-6)*sc);
  }
}

function drawBall(b,r,sc,color){
  var bx=b.x*sc,by=b.y*sc,br=r*sc;
  ctx.beginPath();ctx.arc(bx,by,br+3*sc,0,Math.PI*2);ctx.fillStyle=color;ctx.globalAlpha=0.12;ctx.fill();
  ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fillStyle=color;ctx.globalAlpha=0.9;ctx.fill();
  ctx.globalAlpha=1;
}

function drawScore(info,x,y,sc){
  if(!info.alive)ctx.globalAlpha=0.15;
  ctx.font='bold '+(14*sc)+'px Space Grotesk';ctx.textAlign='center';
  ctx.fillStyle=info.color;ctx.fillText(info.score+'/5',x,y);
  ctx.globalAlpha=1;
}

render();
})();
</script>
</body>
</html>
