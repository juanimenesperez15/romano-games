<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Las Bolas de Romano</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a1a;overflow:hidden;font-family:'Space Grotesk',sans-serif;color:#fff;touch-action:none;-webkit-user-select:none;user-select:none}
    #menu{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:rgba(10,10,26,.95)}
    #menu.hidden{display:none}
    .menu-box{text-align:center;padding:28px 32px;border-radius:20px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);max-width:90vw}
    .menu-box h1{font-size:clamp(22px,6vw,38px);font-weight:800;margin-bottom:4px;background:linear-gradient(135deg,#EF4444,#3B82F6,#22C55E,#F59E0B);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .menu-box .sub{color:rgba(255,255,255,.3);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:18px}
    #nameInput{display:block;width:200px;max-width:80vw;margin:0 auto 12px;padding:10px 14px;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;border:2px solid rgba(255,255,255,.1);border-radius:12px;background:rgba(255,255,255,.05);color:#fff;text-align:center;outline:none}
    .play-btn{display:block;width:200px;max-width:80vw;margin:0 auto;padding:11px;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;border:none;border-radius:12px;background:linear-gradient(135deg,#3B82F6,#22C55E);color:#0a0a1a;cursor:pointer}
    .hint{margin-top:12px;color:rgba(255,255,255,.2);font-size:9px;line-height:1.8}
    #overlay{display:none;position:fixed;inset:0;z-index:90;background:rgba(10,10,26,.85);align-items:center;justify-content:center;text-align:center;flex-direction:column}
    #overlay.show{display:flex}
    #overlay h2{font-size:28px;font-weight:800;margin-bottom:6px}
    #overlay p{color:rgba(255,255,255,.5);font-size:13px}
    #timer{position:fixed;top:6px;left:50%;transform:translateX(-50%);z-index:50;pointer-events:none;font-size:12px;color:rgba(255,255,255,.5)}
    #pwMsg{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);z-index:80;pointer-events:none;font-size:15px;font-weight:700;opacity:0;transition:opacity .3s}
    #pwMsg.show{opacity:1}
    #backBtn{position:fixed;top:8px;left:8px;z-index:60;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);font-size:11px;padding:5px 10px;border-radius:8px;text-decoration:none;font-family:'Space Grotesk',sans-serif}

    /* Layout: canvas + controls + scoreboard */
    #gameWrap{display:none;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100vh}
    #gameWrap.show{display:flex}
    canvas{border-radius:4px;display:block}

    /* Player scoreboard */
    #scoreboard{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;justify-content:center}
    .sb-item{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);font-size:11px}
    .sb-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
    .sb-name{color:rgba(255,255,255,.6);max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .sb-score{font-weight:700;margin-left:4px}
    .sb-item.dead{opacity:.3}

    /* Mobile arrow controls */
    #mobileControls{display:none;margin-top:8px;gap:12px;justify-content:center;align-items:center}
    .arrow-btn{width:64px;height:52px;border-radius:14px;border:2px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:rgba(255,255,255,.6);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:background .1s}
    .arrow-btn.active{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.25)}
  </style>
</head>
<body>
<div id="menu">
  <div class="menu-box">
    <h1>Las Bolas de Romano</h1>
    <div class="sub">4 jugadores &middot; power-ups</div>
    <input type="text" id="nameInput" placeholder="Tu nombre..." maxlength="12" autofocus value="Romano">
    <button class="play-btn" id="playBtn">JUGAR</button>
    <div class="hint" id="hintText">A/D o flechas = mover paleta<br>Primero a 5 goles en contra pierde</div>
  </div>
</div>
<div id="overlay"><h2 id="olTitle"></h2><p id="olMsg"></p></div>
<span id="timer"></span>
<div id="pwMsg"></div>
<a id="backBtn" href="/">&#8592;</a>

<div id="gameWrap">
  <canvas id="game"></canvas>
  <div id="scoreboard"></div>
  <div id="mobileControls">
    <button class="arrow-btn" id="btnLeft">&#9664;</button>
    <button class="arrow-btn" id="btnRight">&#9654;</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
(function(){
'use strict';
var canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
var isTouch=('ontouchstart' in window)||(navigator.maxTouchPoints>0);
var socket=io('/pong',{transports:['websocket']});
var joined=false,state=null,ARENA=800;
var mySide=null; // 'top','bottom','left','right'

var dpr=window.devicePixelRatio||1;
var cssSize=100;
function resize(){
  var maxH=isTouch?innerHeight-130:innerHeight-60;
  var maxW=innerWidth-20;
  cssSize=Math.min(maxW,maxH,ARENA);
  canvas.width=cssSize*dpr;
  canvas.height=cssSize*dpr;
  canvas.style.width=cssSize+'px';
  canvas.style.height=cssSize+'px';
}
resize();addEventListener('resize',resize);
function sc(){return (cssSize*dpr)/ARENA;}

// Show mobile controls
if(isTouch){
  document.getElementById('mobileControls').style.display='flex';
  document.getElementById('hintText').innerHTML='Usa las flechas para mover<br>Primero a 5 goles en contra pierde';
}

// Menu
document.getElementById('playBtn').onclick=function(){
  socket.emit('join',{name:document.getElementById('nameInput').value.trim()||'Jugador'});
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('gameWrap').classList.add('show');
  joined=true;
};
document.getElementById('nameInput').onkeydown=function(e){if(e.key==='Enter')document.getElementById('playBtn').click();};

// Input - adapts to side (lateral sides use up/down)
var inputDir=0;
function isLateral(){return mySide==='left'||mySide==='right';}

addEventListener('keydown',function(e){
  // Horizontal side: A/D or Left/Right
  // Lateral side: W/S or Up/Down
  if(isLateral()){
    if(e.key==='w'||e.key==='W'||e.key==='ArrowUp')inputDir=-1;
    if(e.key==='s'||e.key==='S'||e.key==='ArrowDown')inputDir=1;
  } else {
    if(e.key==='a'||e.key==='A'||e.key==='ArrowLeft')inputDir=-1;
    if(e.key==='d'||e.key==='D'||e.key==='ArrowRight')inputDir=1;
  }
  // Also support both always
  if(e.key==='a'||e.key==='A'||e.key==='ArrowLeft'||e.key==='w'||e.key==='W'||e.key==='ArrowUp')inputDir=-1;
  if(e.key==='d'||e.key==='D'||e.key==='ArrowRight'||e.key==='s'||e.key==='S'||e.key==='ArrowDown')inputDir=1;
});
addEventListener('keyup',function(e){
  if(e.key==='a'||e.key==='A'||e.key==='ArrowLeft'||e.key==='w'||e.key==='W'||e.key==='ArrowUp'){if(inputDir===-1)inputDir=0;}
  if(e.key==='d'||e.key==='D'||e.key==='ArrowRight'||e.key==='s'||e.key==='S'||e.key==='ArrowDown'){if(inputDir===1)inputDir=0;}
});

// Mobile arrow buttons - icons update based on side
var btnL=document.getElementById('btnLeft'),btnR=document.getElementById('btnRight');
var lDown=false,rDown=false;
function updateArrowIcons(){
  if(isLateral()){btnL.innerHTML='&#9650;';btnR.innerHTML='&#9660;';}
  else{btnL.innerHTML='&#9664;';btnR.innerHTML='&#9654;';}
}
btnL.addEventListener('touchstart',function(e){e.preventDefault();lDown=true;btnL.classList.add('active');},{passive:false});
btnL.addEventListener('touchend',function(){lDown=false;btnL.classList.remove('active');});
btnL.addEventListener('touchcancel',function(){lDown=false;btnL.classList.remove('active');});
btnR.addEventListener('touchstart',function(e){e.preventDefault();rDown=true;btnR.classList.add('active');},{passive:false});
btnR.addEventListener('touchend',function(){rDown=false;btnR.classList.remove('active');});
btnR.addEventListener('touchcancel',function(){rDown=false;btnR.classList.remove('active');});

setInterval(function(){
  if(!joined)return;
  var dir=inputDir;
  if(lDown)dir=-1;
  if(rDown)dir=1;
  socket.emit('input',{dir:dir});
},33);

// Network
socket.on('phase',function(d){
  var ol=document.getElementById('overlay'),t=document.getElementById('olTitle'),m=document.getElementById('olMsg');
  if(d.phase==='waiting'){ol.classList.remove('show');}
  else if(d.phase==='playing'){ol.classList.add('show');t.textContent='GO!';t.style.color='#22C55E';m.textContent='';setTimeout(function(){ol.classList.remove('show');},1500);}
  else if(d.phase==='ended'){ol.classList.add('show');t.textContent='GANO: '+d.winner;t.style.color=d.color||'#F59E0B';m.textContent='Nueva ronda en 5s...';}
});
socket.on('pwmsg',function(d){var el=document.getElementById('pwMsg');el.textContent=d.msg;el.style.color='#A78BFA';el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2000);});
socket.on('s',function(s){
  state=s;ARENA=s.arena||800;
  if(s.mySide&&s.mySide!==mySide){mySide=s.mySide;updateArrowIcons();}
});

// Scoreboard
var lastSB='';
function updateScoreboard(){
  if(!state||!state.scores)return;
  var scores=state.scores;
  var sideOrder=['top','right','bottom','left'];
  var html='';
  for(var i=0;i<sideOrder.length;i++){
    var sn=sideOrder[i],info=scores[sn];
    if(!info)continue;
    var dead=!info.alive;
    html+='<div class="sb-item'+(dead?' dead':'')+'"><div class="sb-dot" style="background:'+info.color+'"></div><span class="sb-name">'+info.name+'</span><span class="sb-score" style="color:'+info.color+'">'+info.score+'/5</span></div>';
  }
  if(html!==lastSB){document.getElementById('scoreboard').innerHTML=html;lastSB=html;}
}

// Smooth
var dispBall={x:400,y:400},dispBalls=[],dispPads={},SM=0.45;

function render(){
  requestAnimationFrame(render);
  var s=sc();
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,canvas.width,canvas.height);

  if(!state||!joined){
    ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=2;
    ctx.strokeRect(4,4,canvas.width-8,canvas.height-8);
    return;
  }

  document.getElementById('timer').textContent=state.phase==='waiting'?'Esperando ('+state.pc+'/4) - '+state.tl+'s':'';

  // Arena border
  ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=2*s;
  ctx.strokeRect(2*s,2*s,ARENA*s-4*s,ARENA*s-4*s);
  // Center
  ctx.setLineDash([6*s,6*s]);ctx.strokeStyle='rgba(255,255,255,.03)';ctx.lineWidth=s;
  ctx.beginPath();ctx.moveTo(ARENA*s/2,0);ctx.lineTo(ARENA*s/2,ARENA*s);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,ARENA*s/2);ctx.lineTo(ARENA*s,ARENA*s/2);ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();ctx.arc(ARENA*s/2,ARENA*s/2,50*s,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,.03)';ctx.stroke();

  // Colored walls - alive=thin color line, dead=solid white wall
  var walls={top:[0,0,ARENA,0],bottom:[0,ARENA,ARENA,ARENA],left:[0,0,0,ARENA],right:[ARENA,0,ARENA,ARENA]};
  for(var wn in walls){
    var w=walls[wn],pad=state.pads[wn];
    if(pad&&!pad.alive){
      // Dead = solid wall
      ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=5*s;
      ctx.beginPath();ctx.moveTo(w[0]*s,w[1]*s);ctx.lineTo(w[2]*s,w[3]*s);ctx.stroke();
    } else if(pad&&pad.alive){
      ctx.strokeStyle=pad.color;ctx.globalAlpha=0.25;ctx.lineWidth=3*s;
      ctx.beginPath();ctx.moveTo(w[0]*s,w[1]*s);ctx.lineTo(w[2]*s,w[3]*s);ctx.stroke();
      ctx.globalAlpha=1;
    }
  }

  // Pads
  for(var side in state.pads){
    var pad=state.pads[side];
    if(!pad.alive)continue;
    if(!dispPads[side])dispPads[side]=pad.pos;
    dispPads[side]+=(pad.pos-dispPads[side])*SM;
    var pos=dispPads[side],half=pad.len/2,pt=12,r;
    if(side==='top')r={x:(pos-half)*s,y:0,w:pad.len*s,h:pt*s};
    else if(side==='bottom')r={x:(pos-half)*s,y:(ARENA-pt)*s,w:pad.len*s,h:pt*s};
    else if(side==='left')r={x:0,y:(pos-half)*s,w:pt*s,h:pad.len*s};
    else r={x:(ARENA-pt)*s,y:(pos-half)*s,w:pt*s,h:pad.len*s};

    ctx.fillStyle=pad.color;ctx.globalAlpha=0.9;
    ctx.fillRect(r.x,r.y,r.w,r.h);
    ctx.globalAlpha=1;
  }

  // Ball
  if(state.ball){
    dispBall.x+=(state.ball.x-dispBall.x)*SM;dispBall.y+=(state.ball.y-dispBall.y)*SM;
    drawBall(dispBall,state.ball.r||10,s,'#fff');
  }
  // Extra balls
  if(state.balls){
    while(dispBalls.length<state.balls.length)dispBalls.push({x:400,y:400});
    while(dispBalls.length>state.balls.length)dispBalls.pop();
    for(var bi=0;bi<state.balls.length;bi++){
      dispBalls[bi].x+=(state.balls[bi].x-dispBalls[bi].x)*SM;
      dispBalls[bi].y+=(state.balls[bi].y-dispBalls[bi].y)*SM;
      drawBall(dispBalls[bi],state.balls[bi].r||10,s,'#EC4899');
    }
  }
  // Powerups
  if(state.pw){
    var now=Date.now();
    for(var pi=0;pi<state.pw.length;pi++){
      var pw=state.pw[pi],px=pw.x*s,py=pw.y*s;
      var pulse=1+Math.sin(now*0.005)*0.12,pr=pw.r*s*pulse;
      ctx.beginPath();ctx.arc(px,py,pr+3*s,0,Math.PI*2);ctx.fillStyle=pw.color;ctx.globalAlpha=0.1;ctx.fill();
      ctx.beginPath();ctx.arc(px,py,pr,0,Math.PI*2);ctx.fillStyle=pw.color;ctx.globalAlpha=0.8;ctx.fill();
      ctx.globalAlpha=1;ctx.font=(11*s)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(pw.icon,px,py);ctx.textBaseline='alphabetic';
    }
  }

  updateScoreboard();
}

function drawBall(b,r,s,color){
  var bx=b.x*s,by=b.y*s,br=r*s;
  ctx.beginPath();ctx.arc(bx,by,br+3*s,0,Math.PI*2);ctx.fillStyle=color;ctx.globalAlpha=0.12;ctx.fill();
  ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fillStyle=color;ctx.globalAlpha=0.9;ctx.fill();
  ctx.globalAlpha=1;
}

render();
})();
</script>
</body>
</html>
